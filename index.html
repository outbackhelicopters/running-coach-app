<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Coach — Athlete Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:   #15181C;
    --paper: #FFFFFF;
    --card:  #F7F7F5;
    --rust:  #FF5A4E;
    --moss:  #17B6C4;
    --dusk:  #123A5E;
    --navy-deep: #050C18;
    --gold:   #FFD23F;
    --orange: #FF9F1C;
    --line: rgba(0,0,0,0.10);
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:var(--ink);}
  h1,h2,h3,h4{font-family:'Space Grotesk',Inter,-apple-system,sans-serif;font-weight:700;margin:0 0 .4em;line-height:1.18;letter-spacing:-.01em;}
  h1{font-size:2.4rem;}
  h2{font-size:1.6rem;}
  h3{font-size:1.2rem;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
  }
  p{margin:0 0 1em;}
  .muted{color:rgba(21,24,28,0.6);font-size:.92rem;}
  .container{max-width:1080px;margin:0 auto;padding:0 24px;}
  .narrow{max-width:640px;}
  /* nav */
  header.site{
    position:sticky;top:0;z-index:20;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  header.site .bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1080px;margin:0 auto;}
  header.site .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem;color:var(--ink);text-decoration:none;}
  header.site nav a{margin-left:18px;text-decoration:none;color:var(--ink);font-size:.92rem;font-weight:600;}
  header.site nav a.cta{background:var(--rust);color:#fff;padding:8px 16px;border-radius:8px;}
  /* buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 24px;border-radius:11px;border:1px solid transparent;
    font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;
    font-family:inherit;transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
  }
  .btn-primary{background:var(--rust);color:#fff;box-shadow:0 6px 16px rgba(255,90,78,0.25);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(255,90,78,0.32);}
  .btn-secondary{background:transparent;color:var(--ink);border-color:var(--line);}
  .btn-secondary:hover{background:rgba(21,24,28,0.05);transform:translateY(-2px);}
  .btn-moss{background:var(--moss);color:#fff;}
  .btn-ghost{background:transparent;color:var(--dusk);padding:6px 10px;}
  .btn-danger{background:transparent;color:#a3402a;border-color:#a3402a;}
  .btn-sm{padding:6px 12px;font-size:.82rem;}
  .btn-block{width:100%;}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);}

  /* ============================================================
     HOMEPAGE — clean white / near-black / single coral accent.
     Large imagery, generous spacing, minimal chrome.
     ============================================================ */
  .section{padding:72px 0;}
  .section-head{max-width:640px;margin:0 auto 40px;text-align:center;}
  .section-head h2{font-size:clamp(1.5rem,3.4vw,2rem);}
  .section-head p{color:rgba(21,24,28,0.6);margin:0;}
  .eyebrow-label{
    display:inline-block;color:var(--rust);font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;font-size:.72rem;margin-bottom:10px;
  }

  /* hero — big photo, overlay text */
  .hero-photo{
    position:relative;min-height:min(88vh,760px);display:flex;align-items:flex-end;
    overflow:hidden;background:linear-gradient(160deg,#1c1f22,#0c0d0f);
    color:#fff;
  }
  .hero-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .hero-photo .overlay{
    position:absolute;inset:0;
    background:linear-gradient(0deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.15) 100%);
  }
  .hero-photo .photo-placeholder{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;text-align:center;padding:20px;color:rgba(255,255,255,0.45);font-size:.82rem;font-weight:500;
  }
  .hero-photo .photo-placeholder .icon{font-size:2rem;opacity:.6;}
  .hero-photo .photo-placeholder code{color:rgba(255,255,255,0.65);}
  .hero-content{position:relative;z-index:2;padding:64px 0 56px;width:100%;}
  .hero-content .eyebrow-pill{
    display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);color:#fff;font-weight:600;letter-spacing:.03em;
    font-size:.76rem;padding:6px 14px;border-radius:30px;margin-bottom:18px;backdrop-filter:blur(4px);
  }
  .hero-content h1{
    font-size:clamp(2rem, 5.4vw, 3.4rem);line-height:1.1;margin:0 0 .45em;
    max-width:14ch;color:#fff;
  }
  .hero-content p.subheading{font-size:1.05rem;max-width:46ch;color:rgba(255,255,255,0.82);margin:0 0 28px;}
  .hero-content .actions{display:flex;gap:12px;flex-wrap:wrap;}
  .btn-outline-light{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.4);}
  .btn-outline-light:hover{background:rgba(255,255,255,0.1);transform:translateY(-2px);}

  /* ticker — the moving heading strip */
  .ticker-wrap{overflow:hidden;background:var(--paper);border-bottom:1px solid var(--line);border-top:1px solid var(--line);}
  .ticker-track{display:flex;white-space:nowrap;padding:14px 0;animation:tickerScroll 24s linear infinite;}
  .ticker-track span{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;
    color:var(--ink);padding:0 24px;display:inline-flex;align-items:center;gap:24px;
  }
  .ticker-track span::after{content:"●";color:var(--rust);font-size:.5rem;}
  @keyframes tickerScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  /* about */
  .about-grid{display:grid;grid-template-columns:1fr;gap:32px;align-items:center;}
  @media(min-width:800px){.about-grid{grid-template-columns:.8fr 1.2fr;gap:48px;}}
  .about-photo{
    position:relative;aspect-ratio:4/5;border-radius:16px;overflow:hidden;background:var(--card);
    border:1px solid var(--line);
  }
  .about-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .about-photo .photo-placeholder{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;text-align:center;padding:20px;color:rgba(21,24,28,0.4);font-size:.82rem;font-weight:500;
  }
  .about-photo .photo-placeholder .icon{font-size:1.8rem;opacity:.6;}
  .about-text p{font-size:1.05rem;color:rgba(21,24,28,0.78);}

  /* who I help — 3 cards */
  .who-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
  .who-card{border:1px solid var(--line);border-radius:16px;padding:26px 24px;background:var(--paper);}
  .who-card h3{font-size:1.1rem;margin-bottom:14px;}
  .who-card ul{list-style:none;margin:0;padding:0;}
  .who-card li{
    font-size:.92rem;color:rgba(21,24,28,0.72);padding:6px 0 6px 20px;position:relative;
  }
  .who-card li::before{content:"";position:absolute;left:0;top:14px;width:8px;height:2px;background:var(--rust);}

  /* how it works — 4 steps */
  .steps{display:grid;grid-template-columns:1fr;gap:0;max-width:640px;margin:0 auto;}
  .step-item{display:flex;gap:18px;padding:20px 0;border-top:1px solid var(--line);}
  .step-item:last-child{border-bottom:1px solid var(--line);}
  .step-num{
    flex:0 0 40px;height:40px;border-radius:50%;background:var(--ink);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Space Grotesk',sans-serif;
  }
  .step-text{padding-top:6px;font-weight:600;font-size:1rem;}

  /* what athletes receive */
  .receive-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
  .receive-item{
    border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-weight:600;font-size:.92rem;
    display:flex;align-items:center;gap:10px;background:var(--paper);
  }
  .receive-item::before{content:"✓";color:var(--rust);font-weight:800;}

  /* testimonials */
  .testimonial-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;}
  .testimonial-card{border:1px solid var(--line);border-radius:16px;padding:24px;background:var(--card);position:relative;}
  .testimonial-card .placeholder-tag{
    display:inline-block;background:rgba(255,90,78,0.1);color:var(--rust);font-size:.68rem;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-bottom:12px;
  }
  .testimonial-card p.quote{font-size:.98rem;color:rgba(21,24,28,0.8);font-style:italic;margin-bottom:12px;}
  .testimonial-card .name{font-weight:700;font-size:.88rem;}

  /* pricing placeholder */
  .pricing-box{
    text-align:center;border:1px dashed var(--line);border-radius:16px;padding:44px 24px;max-width:520px;margin:0 auto;
  }
  .pricing-box p{color:rgba(21,24,28,0.65);}

  /* FAQ */
  .faq-list{max-width:680px;margin:0 auto;}
  .faq-item{border-bottom:1px solid var(--line);}
  .faq-q{
    width:100%;text-align:left;background:none;border:none;padding:18px 0;cursor:pointer;
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1rem;color:var(--ink);
    display:flex;justify-content:space-between;align-items:center;gap:12px;
  }
  .faq-q .icon{color:var(--rust);font-size:1.2rem;transition:transform .2s ease;flex:0 0 auto;}
  .faq-item.open .faq-q .icon{transform:rotate(45deg);}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .faq-item.open .faq-a{max-height:240px;}
  .faq-a p{padding-bottom:18px;color:rgba(21,24,28,0.68);font-size:.94rem;margin:0;}

  /* final CTA */
  .final-cta{background:var(--ink);color:#fff;text-align:center;padding:76px 0;}
  .final-cta h2{color:#fff;font-size:clamp(1.6rem,4vw,2.4rem);}
  .final-cta p{color:rgba(255,255,255,0.7);max-width:480px;margin:0 auto 28px;}

  footer.site{border-top:1px solid var(--line);padding:36px 0;}
  footer.site .container{display:flex;flex-direction:column;gap:16px;}
  footer.site .contact-row{display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
  footer.site .contact-row a{font-weight:600;font-size:.9rem;}
  footer.site .copyright{font-size:.82rem;color:rgba(21,24,28,0.5);}
  /* forms */
  .form-page{padding:40px 0 80px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-weight:600;font-size:.88rem;margin-bottom:6px;}
  .field .hint{font-size:.78rem;color:rgba(21,24,28,0.55);margin-top:4px;}
  input[type=text],input[type=email],input[type=tel],input[type=date],input[type=number],input[type=password],select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:.95rem;font-family:inherit;background:#fff;color:var(--ink);
  }
  textarea{min-height:90px;resize:vertical;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--dusk);outline-offset:1px;}
  fieldset{border:1px solid var(--line);border-radius:12px;padding:18px 18px 4px;margin:0 0 24px;}
  legend{font-family:'Space Grotesk',sans-serif;font-weight:600;padding:0 8px;font-size:1.05rem;}
  .success-box{background:var(--card);border:1px solid var(--moss);border-radius:12px;padding:28px;text-align:center;}
  .success-box h2{color:var(--moss);}
  /* dashboard */
  .dash-shell{min-height:100vh;}
  .dash-top{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--card);}
  .dash-top .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;}
  .dash-body{padding:24px;}
  .pipeline{display:flex;gap:14px;overflow-x:auto;padding-bottom:20px;}
  .stage-col{flex:0 0 250px;background:rgba(21,24,28,0.03);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .stage-col h4{font-size:.85rem;text-transform:uppercase;letter-spacing:.04em;color:rgba(21,24,28,0.65);display:flex;justify-content:space-between;margin-bottom:10px;}
  .stage-col h4 .count{background:var(--ink);color:var(--paper);border-radius:20px;padding:1px 8px;font-size:.72rem;}
  .athlete-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow);}
  .athlete-card:hover{border-color:var(--rust);}
  .athlete-card .name{font-weight:700;font-size:.92rem;}
  .athlete-card .sub{font-size:.76rem;color:rgba(21,24,28,0.55);}
  .empty-col{font-size:.78rem;color:rgba(21,24,28,0.4);padding:8px 4px;}
  .pin-gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .pin-box{max-width:340px;width:100%;text-align:center;}
  .pin-dots{display:flex;gap:10px;justify-content:center;margin:18px 0;}
  .pin-dots span{width:14px;height:14px;border-radius:50%;border:1px solid var(--ink);}
  .pin-dots span.filled{background:var(--ink);}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
  .tag{display:inline-block;background:rgba(23,182,196,0.15);color:var(--moss);border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:700;}
  /* profile */
  .profile-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:20px;}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:20px;}
  .tab-btn{background:none;border:none;padding:10px 14px;font-size:.88rem;font-weight:600;color:rgba(21,24,28,0.55);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;}
  .tab-btn.active{color:var(--ink);border-color:var(--rust);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:720px){.grid2{grid-template-columns:1fr;}}
  table.simple{width:100%;border-collapse:collapse;font-size:.88rem;}
  table.simple th,table.simple td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);}
  .template-box{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px;white-space:pre-wrap;font-size:.88rem;}
  .template-actions{display:flex;gap:8px;margin-top:8px;}
  .list-item{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fff;}
  .list-item .meta{font-size:.75rem;color:rgba(21,24,28,0.5);margin-bottom:4px;}
  .row-actions{display:flex;gap:8px;margin-top:16px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:8px;font-size:.85rem;z-index:100;box-shadow:var(--shadow);}
  .link-btn{background:none;border:none;color:var(--dusk);font-weight:600;cursor:pointer;font-size:.85rem;padding:0;font-family:inherit;}
  select.stage-select{width:auto;font-weight:700;}
  .badge-demo{background:var(--rust);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.03em;margin-left:8px;vertical-align:middle;}
  .modal-backdrop{position:fixed;inset:0;background:rgba(21,24,28,0.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal-box{background:var(--card);border-radius:14px;padding:26px;max-width:480px;width:100%;max-height:85vh;overflow:auto;}
</style>
</head>
<body>

/* ============================================================
   TINY IndexedDB LAYER
   ============================================================ */
const DB_NAME = "rc_pipeline_db";
const STORE = "athletes";
let _dbP = null;
function openDB(){
  if(_dbP) return _dbP;
  _dbP = new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        db.createObjectStore(STORE,{keyPath:"id"});
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
  return _dbP;
}
async function dbGetAll(){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readonly");
    const r = tx.objectStore(STORE).getAll();
    r.onsuccess=()=>res(r.result.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));
    r.onerror=()=>rej(r.error);
  });
}
async function dbGet(id){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readonly");
    const r = tx.objectStore(STORE).get(id);
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function dbPut(athlete){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(athlete);
    tx.oncomplete=()=>res(athlete);
    tx.onerror=()=>rej(tx.error);
  });
}
async function dbDelete(id){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete=()=>res();
    tx.onerror=()=>rej(tx.error);
  });
}

function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function firstName(name){ return (name||"there").trim().split(" ")[0]; }
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2400);
}
function simpleHash(str){
  let h=0; for(let i=0;i<str.length;i++){ h=(h<<5)-h+str.charCodeAt(i); h|=0; }
  return String(h);
}
function newAthlete(overrides){
  return Object.assign({
    id: uid(),
    createdAt: Date.now(),
    stage: 0,
    name: "", email: "", phone: "",
    inquiry: {},
    questionnaire: {},
    discoveryNotes: "",
    plan: { sessions: [], paceZones: {} },
    checkins: [],
    reviews: [],
    debrief: {}
  }, overrides||{});
}
function parseHash(){
  const raw = location.hash.replace(/^#/,"") || "/";
  const [path, qs] = raw.split("?");
  const params = {};
  if(qs){ qs.split("&").forEach(kv=>{ const [k,v]=kv.split("="); params[decodeURIComponent(k)]=decodeURIComponent(v||""); }); }
  return { path: path || "/", params };
}
async function submitToFormspree(payload){
  if(!CONFIG.FORMSPREE_ENDPOINT) return { ok:false, skipped:true };
  try{
    const res = await fetch(CONFIG.FORMSPREE_ENDPOINT,{
      method:"POST",
      headers:{ "Content-Type":"application/json", "Accept":"application/json" },
      body: JSON.stringify(payload)
    });
    return { ok: res.ok };
  }catch(e){
    return { ok:false, error:e };
  }
}
function waLink(number, text){
  if(!number) return null;
  return `https://wa.me/${number}?text=${encodeURIComponent(text)}`;
}

function stravaEnabled(){ return !!CONFIG.STRAVA_WORKER_URL; }
function stravaConnectUrl(athleteId){
  // The Worker redirects back to APP_URL (configured when you deploy it)
  // with #/dashboard/athlete/<id>?strava=connected appended.
  return `${CONFIG.STRAVA_WORKER_URL.replace(/\/$/,"")}/connect?athleteId=${encodeURIComponent(athleteId)}`;
}
async function fetchStravaStatus(athleteId){
  if(!stravaEnabled()) return { connected:false, disabled:true };
  try{
    const res = await fetch(`${CONFIG.STRAVA_WORKER_URL.replace(/\/$/,"")}/activities?athleteId=${encodeURIComponent(athleteId)}`);
    if(!res.ok) return { connected:false, error:true };
    return await res.json();
  }catch(e){
    return { connected:false, error:true };
  }
}
async function disconnectStrava(athleteId){
  if(!stravaEnabled()) return;
  try{
    await fetch(`${CONFIG.STRAVA_WORKER_URL.replace(/\/$/,"")}/disconnect?athleteId=${encodeURIComponent(athleteId)}`);
  }catch(e){ /* best effort */ }
}
function paceLabel(minPerKm){
  if(!minPerKm) return "—";
  const m = Math.floor(minPerKm);
  const s = Math.round((minPerKm - m) * 60);
  return `${m}:${String(s).padStart(2,"0")}/km`;
}

function wireHeroMedia(){
  // Secondary photo (About section) — simple load/error swap.
  const aboutImg = document.getElementById("aboutPhoto");
  const aboutPlaceholder = document.getElementById("aboutPhotoPlaceholder");
  if(aboutImg){
    aboutImg.addEventListener("load", ()=>{ aboutImg.style.display="block"; if(aboutPlaceholder) aboutPlaceholder.style.display="none"; });
    aboutImg.addEventListener("error", ()=>{ aboutImg.style.display="none"; if(aboutPlaceholder) aboutPlaceholder.style.display="flex"; });
    if(aboutImg.complete && aboutImg.naturalWidth > 0){ aboutImg.style.display="block"; if(aboutPlaceholder) aboutPlaceholder.style.display="none"; }
  }

  // Hero background — video takes priority if it loads, else falls back to
  // the image, else falls back to the styled placeholder. Both are optional.
  const heroVideo = document.getElementById("heroVideo");
  const heroImg = document.getElementById("heroPhoto");
  const heroPlaceholder = document.getElementById("heroPhotoPlaceholder");
  let videoOk = false;

  function tryHeroImage(){
    if(videoOk || !heroImg) return;
    heroImg.addEventListener("load", ()=>{ if(!videoOk){ heroImg.style.display="block"; if(heroPlaceholder) heroPlaceholder.style.display="none"; } });
    heroImg.addEventListener("error", ()=>{ if(!videoOk){ heroImg.style.display="none"; if(heroPlaceholder) heroPlaceholder.style.display="flex"; } });
    if(heroImg.complete && heroImg.naturalWidth > 0){ heroImg.style.display="block"; if(heroPlaceholder) heroPlaceholder.style.display="none"; }
  }

  if(heroVideo){
    heroVideo.addEventListener("loadeddata", ()=>{
      videoOk = true;
      heroVideo.style.display = "block";
      if(heroImg) heroImg.style.display = "none";
      if(heroPlaceholder) heroPlaceholder.style.display = "none";
    });
    heroVideo.addEventListener("error", tryHeroImage);
    // Give the video a brief moment to fail before also trying the image,
    // in case both loadeddata and error never fire (e.g. empty src).
    setTimeout(tryHeroImage, 50);
  } else {
    tryHeroImage();
  }
}

function wireFaq(){

    btn.addEventListener("click", ()=>{
      const item = btn.closest(".faq-item");
      item.classList.toggle("open");
    });
  });
}

/* ============================================================
   GENERIC FORM RENDERING
   ============================================================ */
function fieldHtml(f, value){
  const val = value==null?"":value;
  const req = f.required ? "required" : "";
  if(f.type==="textarea"){
    return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label>
      <textarea name="${f.id}" ${req}>${esc(val)}</textarea></div>`;
  }
  if(f.type==="select"){
    const opts = (f.options||[]).map(o=>`<option value="${esc(o)}" ${val===o?"selected":""}>${esc(o)}</option>`).join("");
    return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label>
      <select name="${f.id}" ${req}><option value="">Select…</option>${opts}</select></div>`;
  }
  return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label>
    <input type="${f.type}" name="${f.id}" value="${esc(val)}" ${req}></div>`;
}
function readForm(formEl, fields){
  const data = {};
  fields.forEach(f=>{ data[f.id] = formEl.elements[f.id] ? formEl.elements[f.id].value.trim() : ""; });
  return data;
}

function renderInquiry(){
  root.innerHTML = `
    ${siteHeader()}
    <section class="form-page">
      <div class="container narrow">
        <h2>Tell me about you</h2>
        <p class="muted">Two minutes — this is exactly what I'd ask if you messaged me on WhatsApp.</p>
        <form id="inquiryForm" class="card">
          ${INQUIRY_FIELDS.map(f=>fieldHtml(f)).join("")}
          <button class="btn btn-primary btn-block" type="submit">Send inquiry</button>
        </form>
      </div>
    </section>
    ${siteFooter()}
  `;
  document.getElementById("inquiryForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const form = e.target;
    const data = readForm(form, INQUIRY_FIELDS);
    if(!data.name || !data.email || !data.reason){ toast("Please fill in the required fields"); return; }
    const athlete = newAthlete({ name:data.name, email:data.email, phone:data.phone, inquiry:data });
    try{ await dbPut(athlete); }catch(e){ /* fine on athlete's own device, no local dashboard */ }
    const fr = await submitToFormspree({ _subject:`New inquiry: ${data.name}`, form:"inquiry", ...data });
    showFormSuccess(fr, "Thanks — that's in! I'll be in touch shortly, usually within a day.");
  });
}

function renderQuestionnaire(athleteId){
  root.innerHTML = `
    ${siteHeader()}
    <section class="form-page">
      <div class="container narrow">
        <h2>Athlete Questionnaire</h2>
        <p class="muted">Personal details, running history, lifestyle, medical, and your goal. The more detail, the better the plan.</p>
        <form id="qForm" class="card">
          ${QUESTIONNAIRE_SECTIONS.map(sec=>`
            <fieldset>
              <legend>${esc(sec.title)}</legend>
              ${sec.fields.map(f=>fieldHtml(f)).join("")}
            </fieldset>
          `).join("")}
          <button class="btn btn-primary btn-block" type="submit">Submit questionnaire</button>
        </form>
      </div>
    </section>
    ${siteFooter()}
  `;
  document.getElementById("qForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const form = e.target;
    const allFields = QUESTIONNAIRE_SECTIONS.flatMap(s=>s.fields);
    const data = readForm(form, allFields);
    const missing = allFields.filter(f=>f.required && !data[f.id]);
    if(missing.length){ toast("Please fill in the required fields"); return; }

    if(athleteId){
      // Filling out on behalf of a known athlete on the coach's own device
      const existing = await dbGet(athleteId);
      if(existing){
        existing.questionnaire = data;
        existing.name = existing.name || data.fullName;
        existing.email = existing.email || data.email;
        existing.phone = existing.phone || data.phone;
        if(existing.stage < 2) existing.stage = 2;
        await dbPut(existing);
      }
    }
    const fr = await submitToFormspree({ _subject:`Questionnaire: ${data.fullName||"unknown"}`, form:"questionnaire", athleteId: athleteId||"", ...data });
    showFormSuccess(fr, "Questionnaire received — thank you! I'll review this before we talk.");
  });
}

/* ============================================================
   PIN GATE (shared by dashboard + settings)
   ============================================================ */
const PIN_KEY = "rc_pin_hash";
function hasPin(){ return !!localStorage.getItem(PIN_KEY); }
function checkPin(pin){ return localStorage.getItem(PIN_KEY) === simpleHash(pin); }
function setPin(pin){ localStorage.setItem(PIN_KEY, simpleHash(pin)); }
let _unlocked = false;

function renderDashboardGate(athleteId, params){
  if(_unlocked) return renderDashboard(athleteId, params);
  renderPinScreen(()=>{ _unlocked = true; renderDashboard(athleteId, params); });
}
function renderSettingsGate(){
  if(_unlocked) return renderSettings();
  renderPinScreen(()=>{ _unlocked = true; renderSettings(); });
}

function renderPinScreen(onSuccess){
  const creating = !hasPin();
  root.innerHTML = `
    <div class="pin-gate">
      <div class="pin-box">
        <h2>${creating ? "Set a PIN" : "Enter PIN"}</h2>
        <p class="muted">${creating
          ? "This is a simple local lock to deter casual shoulder-surfing — not real security."
          : "This device's dashboard is locked."}</p>
        <div class="pin-dots" id="pinDots"></div>
        <input type="password" id="pinInput" inputmode="numeric" maxlength="6" style="text-align:center;letter-spacing:6px;font-size:1.3rem;max-width:220px;margin:0 auto;display:block;">
        ${creating ? `<p class="muted" style="margin-top:14px;">Confirm:</p><input type="password" id="pinConfirm" inputmode="numeric" maxlength="6" style="text-align:center;letter-spacing:6px;font-size:1.3rem;max-width:220px;margin:0 auto;display:block;">` : ""}
        <button class="btn btn-primary" style="margin-top:20px;" id="pinSubmit">${creating ? "Set PIN" : "Unlock"}</button>
        <p style="margin-top:18px;"><a href="#/">← Back to site</a></p>
      </div>
    </div>
  `;
  document.getElementById("pinSubmit").addEventListener("click", ()=>{
    const pin = document.getElementById("pinInput").value.trim();
    if(pin.length < 4){ toast("PIN should be at least 4 digits"); return; }
    if(creating){
      const confirm = document.getElementById("pinConfirm").value.trim();
      if(pin !== confirm){ toast("PINs don't match"); return; }
      setPin(pin); toast("PIN set"); onSuccess();
    } else {
      if(checkPin(pin)){ onSuccess(); } else { toast("Incorrect PIN"); }
    }
  });
}

  if(!status.connected){

function wireTab(tab, a){
  document.querySelectorAll(".copyBtn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      navigator.clipboard.writeText(btn.dataset.text).then(()=>toast("Copied"));
    });
  });
  if(tab==="overview"){
    document.getElementById("ovSave").addEventListener("click", async ()=>{
      a.name = document.getElementById("ovName").value.trim();
      a.email = document.getElementById("ovEmail").value.trim();
      a.phone = document.getElementById("ovPhone").value.trim();
      await dbPut(a); toast("Saved"); renderAthleteProfile(a);
    });
    renderStravaOverviewBox(a);
  }
  if(tab==="discovery"){
    document.getElementById("saveDiscovery").addEventListener("click", async ()=>{
      a.discoveryNotes = document.getElementById("discoveryNotes").value;
      await dbPut(a); toast("Notes saved");
    });
  }
  if(tab==="plan"){
    document.getElementById("saveZones").addEventListener("click", async ()=>{
      const zones = {};
      document.querySelectorAll("[data-zone]").forEach(inp=>{ zones[inp.dataset.zone] = inp.value.trim(); });
      a.plan = a.plan || {sessions:[],paceZones:{}};
      a.plan.paceZones = zones;
      await dbPut(a); toast("Pace zones saved");
    });
    document.getElementById("addSession").addEventListener("click", async ()=>{
      const day = document.getElementById("sesDay").value.trim();
      const type = document.getElementById("sesType").value.trim();
      const description = document.getElementById("sesDesc").value.trim();
      if(!type){ toast("Session type required"); return; }
      a.plan = a.plan || {sessions:[],paceZones:{}};
      a.plan.sessions.push({day,type,description});
      await dbPut(a); toast("Session added"); renderTab(a);
    });
    document.querySelectorAll(".removeSession").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        a.plan.sessions.splice(parseInt(btn.dataset.i,10),1);
        await dbPut(a); renderTab(a);
      });
    });
  }
  if(tab==="checkins"){
    document.getElementById("addCheckin").addEventListener("click", async ()=>{
      const date = document.getElementById("ciDate").value;
      const notes = document.getElementById("ciNotes").value.trim();
      if(!notes){ toast("Add some notes first"); return; }
      a.checkins = a.checkins||[];
      a.checkins.push({date,notes});
      await dbPut(a); toast("Check-in logged"); renderTab(a);
    });
    document.getElementById("stravaRefreshBtn").addEventListener("click", ()=>renderStravaCheckinBox(a));
    renderStravaCheckinBox(a);
  }
  if(tab==="reviews"){
    document.getElementById("addReview").addEventListener("click", async ()=>{
      const month = document.getElementById("rvMonth").value.trim();
      const notes = document.getElementById("rvNotes").value.trim();
      if(!month || !notes){ toast("Fill in month and notes"); return; }
      a.reviews = a.reviews||[];
      a.reviews.push({month,notes});
      await dbPut(a); toast("Review logged"); renderTab(a);
    });
  }
  if(tab==="debrief"){
    document.getElementById("saveDebrief").addEventListener("click", async ()=>{
      a.debrief = {
        raceName: document.getElementById("dbRace").value.trim(),
        date: document.getElementById("dbDate").value,
        result: document.getElementById("dbResult").value.trim(),
        notes: document.getElementById("dbNotes").value.trim(),
        testimonial: document.getElementById("dbTestimonial").value.trim()
      };
      await dbPut(a); toast("Debrief saved");
    });
  }
}

/* ============================================================
   SETTINGS
   ============================================================ */
function renderSettings(){
  root.innerHTML = `
    <div class="dash-shell">
      <div class="dash-top">
        <a class="btn btn-ghost" href="#/dashboard">← Dashboard</a>
        <span class="brand">Settings</span>
      </div>
      <div class="dash-body">
        <div class="container" style="padding:0;max-width:640px;margin:0;">
          <div class="card" style="margin-bottom:18px;">
            <h3>Business config (reference)</h3>
            <p class="muted">Edit the CONFIG object at the top of index.html to change these.</p>
            <table class="simple">
              <tr><th>Business name</th><td>${esc(CONFIG.BUSINESS_NAME)}</td></tr>
              <tr><th>Coach name</th><td>${esc(CONFIG.COACH_NAME)}</td></tr>
              <tr><th>Contact email</th><td>${esc(CONFIG.CONTACT_EMAIL)}</td></tr>
              <tr><th>WhatsApp number</th><td>${esc(CONFIG.WHATSAPP_NUMBER||"— not set —")}</td></tr>
              <tr><th>Formspree endpoint</th><td>${esc(CONFIG.FORMSPREE_ENDPOINT||"— not set —")}</td></tr>
            </table>
          </div>
          <div class="card" style="margin-bottom:18px;">
            <h3>Reset PIN</h3>
            <div class="field"><label>Current PIN</label><input type="password" id="curPin" maxlength="6"></div>
            <div class="field"><label>New PIN</label><input type="password" id="newPin" maxlength="6"></div>
            <div class="field"><label>Confirm new PIN</label><input type="password" id="confPin" maxlength="6"></div>
            <button class="btn btn-secondary btn-sm" id="resetPinBtn">Update PIN</button>
          </div>
          <div class="card">
            <h3>Backup</h3>
            <p class="muted">Export regularly — this is the only backup of your athlete data.</p>
            <div class="row-actions">
              <button class="btn btn-primary btn-sm" id="exportBtn">Export JSON</button>
              <label class="btn btn-secondary btn-sm" for="importFile" style="cursor:pointer;">Import JSON</label>
              <input type="file" id="importFile" accept="application/json" style="display:none;">
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById("resetPinBtn").addEventListener("click", ()=>{
    const cur = document.getElementById("curPin").value.trim();
    const next = document.getElementById("newPin").value.trim();
    const conf = document.getElementById("confPin").value.trim();
    if(!checkPin(cur)){ toast("Current PIN is incorrect"); return; }
    if(next.length<4){ toast("New PIN should be at least 4 digits"); return; }
    if(next!==conf){ toast("New PINs don't match"); return; }
    setPin(next); toast("PIN updated");
  });
  document.getElementById("exportBtn").addEventListener("click", async ()=>{
    const athletes = await dbGetAll();
    const blob = new Blob([JSON.stringify({ exportedAt:new Date().toISOString(), athletes },null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `running-coach-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  });
  document.getElementById("importFile").addEventListener("change", async e=>{
    const file = e.target.files[0];
    if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      const athletes = data.athletes || data;
      if(!Array.isArray(athletes)) throw new Error("bad format");
      for(const a of athletes){ await dbPut(a); }
      toast(`Imported ${athletes.length} athlete(s)`);
    }catch(err){
      toast("Import failed — invalid file");
    }
  });
}
</script>
</body>
