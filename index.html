<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tom McGookin Coaching — Athlete Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:   #15181C;
    --paper: #FFFFFF;
    --card:  #F7F7F5;
    --rust:  #FF5A4E;
    --moss:  #17B6C4;
    --dusk:  #123A5E;
    --navy-deep: #050C18;
    --gold:   #FFD23F;
    --orange: #FF9F1C;
    --line: rgba(0,0,0,0.10);
    --shadow: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.06);
  }
  /* dark theme — auto-applied by time of day / system preference,
     or forced via the theme toggle (see head script) */
  [data-theme="dark"]{
    --ink:   #F3F4F6;
    --paper: #0E1114;
    --card:  #171B20;
    --rust:  #FF6E62;
    --moss:  #2FD1DE;
    --dusk:  #6FB3E8;
    --line: rgba(255,255,255,0.13);
    --shadow: 0 1px 2px rgba(0,0,0,0.45), 0 4px 20px rgba(0,0,0,0.5);
  }
  [data-theme="dark"] body{background:var(--paper);}
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:var(--ink);}
  h1,h2,h3,h4{font-family:'Space Grotesk',Inter,-apple-system,sans-serif;font-weight:700;margin:0 0 .4em;line-height:1.18;letter-spacing:-.01em;}
  h1{font-size:2.4rem;}
  h2{font-size:1.6rem;}
  h3{font-size:1.2rem;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
  }
  p{margin:0 0 1em;}
  .muted{color:color-mix(in srgb, var(--ink) 60%, transparent);font-size:.92rem;}
  .container{max-width:1080px;margin:0 auto;padding:0 24px;}
  .narrow{max-width:640px;}
  /* nav */
  header.site{
    position:sticky;top:0;z-index:20;
    background:color-mix(in srgb, var(--paper) 92%, transparent);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  header.site .bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1080px;margin:0 auto;}
  header.site .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem;color:var(--ink);text-decoration:none;}
  header.site nav a{margin-left:18px;text-decoration:none;color:var(--ink);font-size:.92rem;font-weight:600;}
  header.site nav a.cta{background:var(--rust);color:#fff;padding:8px 16px;border-radius:8px;}
  header.site nav .theme-toggle-btn{margin-left:18px;}
  .dash-top .theme-toggle-btn{padding:8px 12px;}
  /* buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 24px;border-radius:11px;border:1px solid transparent;
    font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;
    font-family:inherit;transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
  }
  .btn-primary{background:var(--rust);color:#fff;box-shadow:0 6px 16px rgba(255,90,78,0.25);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(255,90,78,0.32);}
  .btn-secondary{background:transparent;color:var(--ink);border-color:var(--line);}
  .btn-secondary:hover{background:color-mix(in srgb, var(--ink) 5%, transparent);transform:translateY(-2px);}
  .btn-moss{background:var(--moss);color:#fff;}
  .btn-ghost{background:transparent;color:var(--dusk);padding:6px 10px;}
  .btn-danger{background:transparent;color:#a3402a;border-color:#a3402a;}
  .btn-sm{padding:6px 12px;font-size:.82rem;}
  .btn-block{width:100%;}
  .theme-toggle-btn{
    background:none;border:1px solid var(--line);border-radius:8px;padding:6px 12px;
    font-size:.82rem;font-weight:600;cursor:pointer;font-family:inherit;color:var(--ink);
    white-space:nowrap;
  }
  .theme-toggle-btn:hover{background:color-mix(in srgb, var(--ink) 6%, transparent);}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);}

  /* ============================================================
     HOMEPAGE — clean white / near-black / single coral accent.
     Large imagery, generous spacing, minimal chrome.
     ============================================================ */
  .section{padding:72px 0;}
  .section-head{max-width:640px;margin:0 auto 40px;text-align:center;}
  .section-head h2{font-size:clamp(1.5rem,3.4vw,2rem);}
  .section-head p{color:color-mix(in srgb, var(--ink) 60%, transparent);margin:0;}
  .eyebrow-label{
    display:inline-block;color:var(--rust);font-weight:700;letter-spacing:.08em;
    text-transform:uppercase;font-size:.72rem;margin-bottom:10px;
  }

  /* hero — big photo, overlay text */
  .hero-photo{
    position:relative;min-height:min(88vh,760px);display:flex;align-items:flex-end;
    overflow:hidden;background:linear-gradient(160deg,#1c1f22,#0c0d0f);
    color:#fff;
  }
  .hero-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .hero-photo .overlay{
    position:absolute;inset:0;
    background:linear-gradient(0deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.35) 55%, rgba(0,0,0,0.15) 100%);
  }
  .hero-photo .photo-placeholder{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;text-align:center;padding:20px;color:rgba(255,255,255,0.45);font-size:.82rem;font-weight:500;
  }
  .hero-photo .photo-placeholder .icon{font-size:2rem;opacity:.6;}
  .hero-photo .photo-placeholder code{color:rgba(255,255,255,0.65);}
  .hero-content{position:relative;z-index:2;padding:64px 0 56px;width:100%;}
  .hero-content .eyebrow-pill{
    display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);color:#fff;font-weight:600;letter-spacing:.03em;
    font-size:.76rem;padding:6px 14px;border-radius:30px;margin-bottom:18px;backdrop-filter:blur(4px);
  }
  .hero-content h1{
    font-size:clamp(2rem, 5.4vw, 3.4rem);line-height:1.1;margin:0 0 .45em;
    max-width:14ch;color:#fff;
  }
  .hero-content p.subheading{font-size:1.05rem;max-width:46ch;color:rgba(255,255,255,0.82);margin:0 0 28px;}
  .hero-content .actions{display:flex;gap:12px;flex-wrap:wrap;}
  .btn-outline-light{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.4);}
  .btn-outline-light:hover{background:rgba(255,255,255,0.1);transform:translateY(-2px);}

  /* ticker — the moving heading strip */
  .ticker-wrap{overflow:hidden;background:var(--paper);border-bottom:1px solid var(--line);border-top:1px solid var(--line);}
  .ticker-track{display:flex;white-space:nowrap;padding:14px 0;animation:tickerScroll 24s linear infinite;}
  .ticker-track span{
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:.95rem;
    color:var(--ink);padding:0 24px;display:inline-flex;align-items:center;gap:24px;
  }
  .ticker-track span::after{content:"●";color:var(--rust);font-size:.5rem;}
  @keyframes tickerScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  /* about */
  .about-grid{display:grid;grid-template-columns:1fr;gap:32px;align-items:center;}
  @media(min-width:800px){.about-grid{grid-template-columns:.8fr 1.2fr;gap:48px;}}
  .about-photo{
    position:relative;aspect-ratio:4/5;border-radius:16px;overflow:hidden;background:var(--card);
    border:1px solid var(--line);
  }
  .about-photo img{width:100%;height:100%;object-fit:cover;display:block;}
  .about-photo .photo-placeholder{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;text-align:center;padding:20px;color:color-mix(in srgb, var(--ink) 40%, transparent);font-size:.82rem;font-weight:500;
  }
  .about-photo .photo-placeholder .icon{font-size:1.8rem;opacity:.6;}
  .about-text p{font-size:1.05rem;color:color-mix(in srgb, var(--ink) 78%, transparent);}

  /* who I help — 3 cards */
  .who-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}
  .who-card{border:1px solid var(--line);border-radius:16px;padding:26px 24px;background:var(--paper);}
  .who-card h3{font-size:1.1rem;margin-bottom:14px;}
  .who-card ul{list-style:none;margin:0;padding:0;}
  .who-card li{
    font-size:.92rem;color:color-mix(in srgb, var(--ink) 72%, transparent);padding:6px 0 6px 20px;position:relative;
  }
  .who-card li::before{content:"";position:absolute;left:0;top:14px;width:8px;height:2px;background:var(--rust);}

  /* how it works — 4 steps */
  .steps{display:grid;grid-template-columns:1fr;gap:0;max-width:640px;margin:0 auto;}
  .step-item{display:flex;gap:18px;padding:20px 0;border-top:1px solid var(--line);}
  .step-item:last-child{border-bottom:1px solid var(--line);}
  .step-num{
    flex:0 0 40px;height:40px;border-radius:50%;background:var(--ink);color:var(--paper);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'Space Grotesk',sans-serif;
  }
  .step-text{padding-top:6px;font-weight:600;font-size:1rem;}

  /* what athletes receive */
  .receive-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;}
  .receive-item{
    border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-weight:600;font-size:.92rem;
    display:flex;align-items:center;gap:10px;background:var(--paper);
  }
  .receive-item::before{content:"✓";color:var(--rust);font-weight:800;}

  /* testimonials */
  .testimonial-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;}
  .testimonial-card{border:1px solid var(--line);border-radius:16px;padding:24px;background:var(--card);position:relative;}
  .testimonial-card .placeholder-tag{
    display:inline-block;background:rgba(255,90,78,0.1);color:var(--rust);font-size:.68rem;font-weight:700;
    letter-spacing:.04em;text-transform:uppercase;padding:3px 8px;border-radius:20px;margin-bottom:12px;
  }
  .testimonial-card p.quote{font-size:.98rem;color:color-mix(in srgb, var(--ink) 80%, transparent);font-style:italic;margin-bottom:12px;}
  .testimonial-card .name{font-weight:700;font-size:.88rem;}

  /* pricing placeholder */
  .pricing-box{
    text-align:center;border:1px dashed var(--line);border-radius:16px;padding:44px 24px;max-width:520px;margin:0 auto;
  }
  .pricing-box p{color:color-mix(in srgb, var(--ink) 65%, transparent);}

  /* FAQ */
  .faq-list{max-width:680px;margin:0 auto;}
  .faq-item{border-bottom:1px solid var(--line);}
  .faq-q{
    width:100%;text-align:left;background:none;border:none;padding:18px 0;cursor:pointer;
    font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:1rem;color:var(--ink);
    display:flex;justify-content:space-between;align-items:center;gap:12px;
  }
  .faq-q .icon{color:var(--rust);font-size:1.2rem;transition:transform .2s ease;flex:0 0 auto;}
  .faq-item.open .faq-q .icon{transform:rotate(45deg);}
  .faq-a{max-height:0;overflow:hidden;transition:max-height .25s ease;}
  .faq-item.open .faq-a{max-height:240px;}
  .faq-a p{padding-bottom:18px;color:color-mix(in srgb, var(--ink) 68%, transparent);font-size:.94rem;margin:0;}

  /* final CTA */
  .final-cta{background:var(--ink);color:var(--paper);text-align:center;padding:76px 0;}
  .final-cta h2{color:var(--paper);font-size:clamp(1.6rem,4vw,2.4rem);}
  .final-cta p{color:color-mix(in srgb, var(--paper) 70%, transparent);max-width:480px;margin:0 auto 28px;}

  footer.site{border-top:1px solid var(--line);padding:36px 0;}
  footer.site .container{display:flex;flex-direction:column;gap:16px;}
  footer.site .contact-row{display:flex;gap:20px;flex-wrap:wrap;align-items:center;}
  footer.site .contact-row a{font-weight:600;font-size:.9rem;}
  footer.site .copyright{font-size:.82rem;color:color-mix(in srgb, var(--ink) 50%, transparent);}
  /* forms */
  .form-page{padding:40px 0 80px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-weight:600;font-size:.88rem;margin-bottom:6px;}
  .field .hint{font-size:.78rem;color:color-mix(in srgb, var(--ink) 55%, transparent);margin-top:4px;}
  input[type=text],input[type=email],input[type=tel],input[type=date],input[type=number],input[type=password],select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:.95rem;font-family:inherit;background:var(--paper);color:var(--ink);
  }
  textarea{min-height:90px;resize:vertical;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--dusk);outline-offset:1px;}
  fieldset{border:1px solid var(--line);border-radius:12px;padding:18px 18px 4px;margin:0 0 24px;}
  legend{font-family:'Space Grotesk',sans-serif;font-weight:600;padding:0 8px;font-size:1.05rem;}
  .success-box{background:var(--card);border:1px solid var(--moss);border-radius:12px;padding:28px;text-align:center;}
  .success-box h2{color:var(--moss);}
  /* dashboard */
  .dash-shell{min-height:100vh;}
  .dash-top{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--card);}
  .dash-top .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;}
  .dash-body{padding:24px;}
  .pipeline{display:flex;gap:14px;overflow-x:auto;padding-bottom:20px;}
  .stage-col{flex:0 0 250px;background:color-mix(in srgb, var(--ink) 3%, transparent);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .stage-col h4{font-size:.85rem;text-transform:uppercase;letter-spacing:.04em;color:color-mix(in srgb, var(--ink) 65%, transparent);display:flex;justify-content:space-between;margin-bottom:10px;}
  .stage-col h4 .count{background:var(--ink);color:var(--paper);border-radius:20px;padding:1px 8px;font-size:.72rem;}
  .athlete-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow);}
  .athlete-card:hover{border-color:var(--rust);}
  .athlete-card .name{font-weight:700;font-size:.92rem;}
  .athlete-card .sub{font-size:.76rem;color:color-mix(in srgb, var(--ink) 55%, transparent);}
  .empty-col{font-size:.78rem;color:color-mix(in srgb, var(--ink) 40%, transparent);padding:8px 4px;}
  .pin-gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .pin-box{max-width:340px;width:100%;text-align:center;}
  .pin-dots{display:flex;gap:10px;justify-content:center;margin:18px 0;}
  .pin-dots span{width:14px;height:14px;border-radius:50%;border:1px solid var(--ink);}
  .pin-dots span.filled{background:var(--ink);}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
  .tag{display:inline-block;background:rgba(23,182,196,0.15);color:var(--moss);border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:700;}
  /* profile */
  .profile-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:20px;}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:20px;}
  .tab-btn{background:none;border:none;padding:10px 14px;font-size:.88rem;font-weight:600;color:color-mix(in srgb, var(--ink) 55%, transparent);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;}
  .tab-btn.active{color:var(--ink);border-color:var(--rust);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:720px){.grid2{grid-template-columns:1fr;}}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}
  @media(max-width:900px){.grid3{grid-template-columns:1fr;}}

  /* App Preview section — stylised, illustrative mockups (not real
     screenshots/data) of the athlete dashboard, calendar, and progress
     tracker, so the homepage can show off the app without needing a real
     athlete's data on display. */
  .app-preview-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;}
  @media(max-width:900px){.app-preview-grid{grid-template-columns:1fr;}}
  .app-preview-card{text-align:center;}
  .app-preview-frame{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:16px;box-shadow:var(--shadow);text-align:left;
  }
  .ap-row{margin-bottom:10px;}
  .ap-header{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:.9rem;padding-bottom:8px;border-bottom:1px solid var(--line);}
  .ap-hero{font-weight:600;font-size:.95rem;color:var(--rust);}
  .ap-bar{height:8px;border-radius:99px;background:color-mix(in srgb, var(--ink) 8%, transparent);overflow:hidden;}
  .ap-bar-fill{height:100%;background:var(--rust);border-radius:99px;}
  .ap-card{background:color-mix(in srgb, var(--ink) 4%, transparent);border-radius:10px;padding:8px 10px;font-size:.82rem;}
  .ap-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:10px;}
  .ap-cal-cell{aspect-ratio:1;border-radius:5px;background:color-mix(in srgb, var(--ink) 6%, transparent);}
  .ap-cal-active{background:var(--rust);}
  .ap-caption{margin-top:12px;font-size:.82rem;font-weight:600;color:color-mix(in srgb, var(--ink) 65%, transparent);}
  table.simple{width:100%;border-collapse:collapse;font-size:.88rem;}
  table.simple th,table.simple td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);}
  .template-box{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px;white-space:pre-wrap;font-size:.88rem;}
  .template-actions{display:flex;gap:8px;margin-top:8px;}
  .list-item{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:var(--paper);}
  .list-item .meta{font-size:.75rem;color:color-mix(in srgb, var(--ink) 50%, transparent);margin-bottom:4px;}
  .row-actions{display:flex;gap:8px;margin-top:16px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:8px;font-size:.85rem;z-index:100;box-shadow:var(--shadow);}
  .link-btn{background:none;border:none;color:var(--dusk);font-weight:600;cursor:pointer;font-size:.85rem;padding:0;font-family:inherit;}
  select.stage-select{width:auto;font-weight:700;}
  .badge-demo{background:var(--rust);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.03em;margin-left:8px;vertical-align:middle;}
  .modal-backdrop{position:fixed;inset:0;background:rgba(21,24,28,0.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal-box{background:var(--card);border-radius:14px;padding:26px;max-width:480px;width:100%;max-height:85vh;overflow:auto;}

  /* overview cards (coach dashboard + progress tabs) */
  .overview-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
  .ov-card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;text-align:center;}
  .ov-card.ov-warn{border-color:var(--rust);background:rgba(255,90,78,0.06);}
  .ov-num{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.6rem;line-height:1.1;}
  .ov-label{font-size:.78rem;color:color-mix(in srgb, var(--ink) 60%, transparent);margin-top:4px;}
  .ov-sub{font-size:.72rem;color:color-mix(in srgb, var(--ink) 45%, transparent);margin-top:2px;}

  .reminder-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 0;border-bottom:1px solid var(--line);font-size:.88rem;}
  .reminder-row:last-child{border-bottom:none;}

  /* race prep checklist */
  .checklist-row{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:.92rem;cursor:pointer;}
  .checklist-row input{width:auto;}

  /* plan builder weeks */
  .week-card.week-current{border-color:var(--rust);}
  .week-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:10px;}

  /* simple bar chart (weekly km) */
  .bar-chart{display:flex;align-items:flex-end;gap:10px;height:140px;overflow-x:auto;padding-top:8px;}
  .bar-col{display:flex;flex-direction:column;align-items:center;gap:6px;flex:0 0 34px;height:100%;justify-content:flex-end;}
  .bar-track{position:relative;width:20px;height:110px;background:color-mix(in srgb, var(--ink) 8%, transparent);border-radius:4px;display:flex;align-items:flex-end;overflow:hidden;}

<script>
/* ============================================================
   THEME — auto light/dark based on system preference + time of
   day (dark 7pm–7am), with a manual light/dark/auto override
   saved per-device. Runs synchronously in <head> so the correct
   theme is set before first paint (no flash of wrong theme).
   ============================================================ */
function getEffectiveTheme(){
  try{
    var pref = localStorage.getItem("themePref") || "auto";
    if(pref==="light" || pref==="dark") return pref;
    var sysDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    var h = new Date().getHours();
    var timeDark = (h>=19 || h<7);
    return (sysDark || timeDark) ? "dark" : "light";
  }catch(e){ return "light"; }
}
function applyTheme(){
  document.documentElement.setAttribute("data-theme", getEffectiveTheme());
}
function cycleTheme(){
  var cur = localStorage.getItem("themePref") || "auto";
  var next = cur==="auto" ? "light" : (cur==="light" ? "dark" : "auto");
  localStorage.setItem("themePref", next);
  location.reload();
}
function themeToggleLabel(){
  var pref = localStorage.getItem("themePref") || "auto";
  return pref==="dark" ? "🌙 Dark" : pref==="light" ? "☀️ Light" : "🌓 Auto";
}
applyTheme();
if(window.matchMedia){
  try{ window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", applyTheme); }catch(e){}
}
</script>

/* ============================================================
   SESSION (real accounts) — a small backend now holds all data,
   shared across every device. This replaces the old per-browser
   IndexedDB + local PIN. One coach account, plus a login per
   athlete that the coach sets up once a plan is ready for them.
   ============================================================ */
const SESSION_KEY = "rc_session_v1"; // { role: "coach"|"athlete", token, athleteId? }
// "Stay logged in" (checked, default) persists the session in localStorage
// so it survives closing the browser/tab, for up to the token's 30-day life.
// Unchecked stores it in sessionStorage instead, so it's cleared the moment
// the browser or tab closes, for anyone on a shared/public device.
function getSession(){
  try{
    return JSON.parse(sessionStorage.getItem(SESSION_KEY)) || JSON.parse(localStorage.getItem(SESSION_KEY)) || null;
  }catch(e){ return null; }
}
function setSession(s, remember){
  localStorage.removeItem(SESSION_KEY);
  sessionStorage.removeItem(SESSION_KEY);
  (remember===false ? sessionStorage : localStorage).setItem(SESSION_KEY, JSON.stringify(s));
}
function clearSession(){ localStorage.removeItem(SESSION_KEY); sessionStorage.removeItem(SESSION_KEY); }
function isCoach(){ const s=getSession(); return !!(s && s.role==="coach" && s.token); }
function isAthlete(id){ const s=getSession(); return !!(s && s.role==="athlete" && s.token && (!id || s.athleteId===id)); }

async function apiFetch(path, opts){
  opts = opts || {};
  const session = getSession();
  const headers = Object.assign({ "Content-Type":"application/json" }, opts.headers||{});
  if(session && session.token) headers.Authorization = "Bearer " + session.token;
  const res = await fetch(path, Object.assign({}, opts, { headers }));
  let body = null;
  try{ body = await res.json(); }catch(e){ /* no body */ }
  if(res.status === 401){ clearSession(); }
  if(!res.ok){
    const err = new Error((body && body.error) || `Request failed (${res.status})`);
    err.status = res.status;
    throw err;
  }
  return body;
}

/* ============================================================
   DATA LAYER — thin wrappers over the API. Function names/shapes
   are kept identical to the old IndexedDB layer on purpose, so the
   large amount of existing render/tab code below needs almost no
   changes: it just calls dbGetAll()/dbGet()/dbPut()/dbDelete().
   ============================================================ */
async function dbGetAll(){
  const list = await apiFetch("/api/athletes");
  return list.map(migrateAthlete);
}
async function dbGet(id){
  try{
    const a = await apiFetch(`/api/athletes/${encodeURIComponent(id)}`);
    return a ? migrateAthlete(a) : a;
  }catch(e){
    if(e.status === 404) return null;
    throw e;
  }
}
async function dbPut(athlete){
  // Full replace — coach-only on the server. Used by every coach-side save
  // action (overview, plan builder, race prep, check-ins, etc).
  return apiFetch(`/api/athletes/${encodeURIComponent(athlete.id)}`, { method:"PUT", body: JSON.stringify(athlete) });
}
async function dbDelete(id){
  return apiFetch(`/api/athletes/${encodeURIComponent(id)}`, { method:"DELETE" });
}
// The one write a logged-in athlete is allowed to make themselves: marking
// a single session complete. Coach can call this too (used by "View as
// Athlete" so both paths behave identically).
async function apiPatchSession(athleteId, weekId, sessionId, completed, actual){
  return apiFetch(`/api/athletes/${encodeURIComponent(athleteId)}/session`, {
    method:"PATCH", body: JSON.stringify({ weekId, sessionId, completed, actual })
  });
}
async function getResources(){ return apiFetch("/api/resources"); }
async function addResource(r){ return apiFetch("/api/resources", { method:"POST", body: JSON.stringify(r) }); }
async function deleteResource(id){ return apiFetch(`/api/resources/${encodeURIComponent(id)}`, { method:"DELETE" }); }

async function coachStatus(){
  const res = await fetch("/api/coach/status");
  return res.json();
}
async function coachSetup(email,password){ return apiFetch("/api/coach/setup", { method:"POST", body: JSON.stringify({email,password}) }); }
async function coachLogin(email,password){ return apiFetch("/api/coach/login", { method:"POST", body: JSON.stringify({email,password}) }); }
async function athleteLogin(email,password){ return apiFetch("/api/athlete/login", { method:"POST", body: JSON.stringify({email,password}) }); }

function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

  document.body.appendChild(t); setTimeout(()=>t.remove(),2400);
}

    age: "", experience: "",
    goalRace: "", goalRaceDate: "", goalTime: "",

    inquiry: {},
    questionnaire: {},
    discoveryNotes: "",
    welcomeMessage: "", recentRacePerformance: "", currentWeeklyVolume: "",
    currentFocusAreas: [], goalA: "", goalB: "", goalC: "",
    /* paymentStatus: "pending" (default for new self-serve signups — no
       dashboard access until the coach marks them paid, or they redeem a
       coach-issued access code for free/trial access), "active" (paid,
       full access), or "comp" (free access via access code). */
    paymentStatus: "pending", accessCode: "",
    /* plan.weeks: [{ id, weekNumber, startDate, coachFocus, sessions:[{
         id, day, type, distance, pace, description, warmup, main, cooldown,
         coachNotes, completed, actual:{distance,time,rpe,notes}
       }] }] */
    plan: { paceZones: {}, weeks: [] },

    raceNotes: { targetPace:"", nutritionPlan:"", pacingStrategy:"", raceDayReminders:"" },
    /* messages: [{date, text}] — coach notes shown to the athlete, newest last */
    messages: []
  }, overrides||{});
}
/* Fills in any fields missing on athletes created before this data model
   existed, so older demo/local data doesn't break new UI. */
function migrateAthlete(a){
  // Grandfather in athletes that existed before payment gating was added —
  // they shouldn't suddenly get locked out. New athletes get "pending" from
  // newAthlete()/the server's public signup endpoints; only backfill here.
  const hadNoPaymentStatus = a.paymentStatus === undefined;
  const blank = newAthlete({});
  for(const k of Object.keys(blank)){
    if(a[k] === undefined) a[k] = blank[k];
  }
  if(hadNoPaymentStatus) a.paymentStatus = "active";
  if(!a.plan) a.plan = { paceZones:{}, weeks:[] };
  if(!a.plan.weeks) a.plan.weeks = [];
  if(!a.plan.paceZones) a.plan.paceZones = {};
  // migrate old flat plan.sessions (pre weekly-plan redesign) into Week 1
  if(Array.isArray(a.plan.sessions) && a.plan.sessions.length && !a.plan.weeks.length){
    a.plan.weeks.push({
      id: uid(), weekNumber: 1, startDate: new Date().toISOString().slice(0,10),
      coachFocus: "",
      sessions: a.plan.sessions.map(s=>({
        id: uid(), day: s.day||"", type: s.type||"", distance:"", pace:"",
        description: s.description||"", warmup:"", main:"", cooldown:"", coachNotes:"",
        completed:false, actual:{distance:"",time:"",rpe:"",notes:""}
      }))
    });
    delete a.plan.sessions;
  }
  if(!a.raceChecklist) a.raceChecklist = { finalLongRun:false, racePacePractised:false, taperStarted:false, raceStrategyReviewed:false };
  if(!a.raceNotes) a.raceNotes = { targetPace:"", nutritionPlan:"", pacingStrategy:"", raceDayReminders:"" };
  if(!a.personalBests) a.personalBests = {};
  if(!a.messages) a.messages = [];
  if(a.currentWeekIndex == null) a.currentWeekIndex = 0;
  return a;
}
function parseHash(){
  const raw = location.hash.replace(/^#/,"") || "/";
  const [path, qs] = raw.split("?");
  const params = {};
  if(qs){ qs.split("&").forEach(kv=>{ const [k,v]=kv.split("="); params[decodeURIComponent(k)]=decodeURIComponent(v||""); }); }
  return { path: path || "/", params };
}
async function submitToFormspree(payload){
  if(!CONFIG.FORMSPREE_ENDPOINT) return { ok:false, skipped:true };
  try{
    const res = await fetch(CONFIG.FORMSPREE_ENDPOINT,{
      method:"POST",
      headers:{ "Content-Type":"application/json", "Accept":"application/json" },
      body: JSON.stringify(payload)
    });
    return { ok: res.ok };
  }catch(e){
    return { ok:false, error:e };
  }
}
function waLink(number, text){
  if(!number) return null;
  return `https://wa.me/${number}?text=${encodeURIComponent(text)}`;

function paceLabel(minPerKm){
  if(!minPerKm) return "—";
  const m = Math.floor(minPerKm);
  const s = Math.round((minPerKm - m) * 60);
  return `${m}:${String(s).padStart(2,"0")}/km`;
}

/* ============================================================
   PLAN / PROGRESS HELPERS
   Stages used by "active" checks below: index 6 = Active Coaching,
   7 = Race Week — i.e. currently mid training block.
   ============================================================ */
const ACTIVE_STAGES = [6,7];
function isActiveAthlete(a){ return ACTIVE_STAGES.includes(a.stage); }
function getWeeks(a){ return (a.plan && a.plan.weeks) || []; }
function getCurrentWeek(a){
  const weeks = getWeeks(a);
  if(!weeks.length) return null;
  const idx = Math.min(Math.max(a.currentWeekIndex||0,0), weeks.length-1);
  return weeks[idx];
}
// The week an athlete is currently LOOKING at in the Training tab. This is
// deliberately separate from a.currentWeekIndex (the coach's official
// "current" week, used for streak calc, the coach's own dashboard stats,
// and the "Current" tag in Plan Builder). Browsing forward/back to preview
// a different week must never overwrite that shared, persisted value —
// it's local-only and resets whenever the athlete navigates to the tab
// fresh (see _avWeekIndex reset in renderAthleteView).
function getViewedWeek(a){
  const weeks = getWeeks(a);
  if(!weeks.length) return null;
  const want = _avWeekIndex!=null ? _avWeekIndex : (a.currentWeekIndex||0);
  const idx = Math.min(Math.max(want,0), weeks.length-1);
  return weeks[idx];
}
function weekProgress(week){
  if(!week) return { completed:0, total:0, distanceCompleted:0, distanceTotal:0, longRunDone:false, pct:0 };
  const sessions = week.sessions||[];
  const total = sessions.length;
  const completed = sessions.filter(s=>s.completed).length;
  let distanceTotal = 0, distanceCompleted = 0;
  let longRunDone = false;
  sessions.forEach(s=>{
    const planned = parseFloat(s.distance)||0;
    distanceTotal += planned;
    if(s.completed){
      const actualDist = parseFloat(s.actual && s.actual.distance) || planned;
      distanceCompleted += actualDist;
      if(/long/i.test(s.type||"")) longRunDone = true;
    }
  });
  return { completed, total, distanceCompleted, distanceTotal, longRunDone, pct: total ? Math.round((completed/total)*100) : 0 };
}
function daysUntil(dateStr){
  if(!dateStr) return null;
  const target = new Date(dateStr+"T00:00:00");
  if(isNaN(target)) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((target-today)/86400000);
}
function fmtDate(dateStr){
  if(!dateStr) return "—";
  const d = new Date(dateStr+"T00:00:00");
  if(isNaN(d)) return dateStr;
  return d.toLocaleDateString(undefined,{ day:"numeric", month:"short", year:"numeric" });
}

/* ============================================================
   CALENDAR EXPORT (.ics) — lets an athlete add a session, or a
   whole week, to their phone's calendar (Android + iPhone both
   handle a downloaded .ics the same way: open it, tap "Add").
   ============================================================ */
const WEEKDAY_OFFSETS = {
  monday:0, mon:0, tuesday:1, tue:1, tues:1, wednesday:2, wed:2,
  thursday:3, thu:3, thur:3, thurs:3, friday:4, fri:4,
  saturday:5, sat:5, sunday:6, sun:6
};
function weekdayOffset(dayStr){
  if(!dayStr) return null;
  const key = String(dayStr).trim().toLowerCase().replace(/[^a-z]/g,"");
  return Object.prototype.hasOwnProperty.call(WEEKDAY_OFFSETS, key) ? WEEKDAY_OFFSETS[key] : null;
}
// yyyy-mm-dd using the Date object's LOCAL fields — toISOString() would
// convert to UTC first, which silently shifts the date by a day for any
// timezone behind UTC at local midnight (including all of Australia).
function toLocalISODate(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
// Real calendar date (yyyy-mm-dd) for a session, derived from its week's
// start date + the session's day name. Returns null if either is missing
// or the day name can't be recognised.
function sessionDateISO(week, session){
  if(!week || !week.startDate) return null;
  const offset = weekdayOffset(session && session.day);
  if(offset==null) return null;
  const d = new Date(week.startDate+"T00:00:00");
  if(isNaN(d)) return null;
  d.setDate(d.getDate()+offset);
  return toLocalISODate(d);
}
function icsEscape(str){
  return String(str||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n");
}
// RFC5545 line folding — continuation lines start with a single space.
function foldICSLine(line){
  if(line.length<=73) return line;
  let out = "", i = 0;
  while(i<line.length){ out += (i===0?"":"\r\n ") + line.slice(i,i+73); i+=73; }
  return out;
}
const ICS_DEFAULT_HOUR = "0600"; // placeholder time — athlete can drag it in their calendar app
function buildSessionVEvent(a, week, session){
  const dateISO = sessionDateISO(week, session);
  if(!dateISO) return null;
  const dateCompact = dateISO.replace(/-/g,"");
  const dtStart = `${dateCompact}T${ICS_DEFAULT_HOUR}00`;
  const dtEnd = `${dateCompact}T${(parseInt(ICS_DEFAULT_HOUR.slice(0,2),10)+1).toString().padStart(2,"0")}${ICS_DEFAULT_HOUR.slice(2)}00`;
  const summary = icsEscape(`${session.type||"Training session"}${session.distance?" - "+session.distance+"km":""}`);
  const descParts = [];
  if(session.pace) descParts.push("Pace: "+session.pace);
  if(session.warmup) descParts.push("Warm-up: "+session.warmup);
  if(session.main) descParts.push("Main: "+session.main);
  if(session.cooldown) descParts.push("Cool-down: "+session.cooldown);
  if(session.description) descParts.push(session.description);
  if(session.coachNotes) descParts.push("Coach notes: "+session.coachNotes);
  const description = icsEscape(descParts.join("\n"));
  const stamp = new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  return [
    "BEGIN:VEVENT",
    `UID:${session.id||uid()}@${a.id||"athlete"}.${(CONFIG.BUSINESS_NAME||"runningcoach").replace(/[^a-z0-9]/gi,"").toLowerCase()}`,
    `DTSTAMP:${stamp}`,
    `DTSTART:${dtStart}`,
    `DTEND:${dtEnd}`,
    foldICSLine(`SUMMARY:${summary}`),
    foldICSLine(`DESCRIPTION:${description}`),
    "END:VEVENT"
  ].join("\r\n");
}
function buildICS(vevents){
  return [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    `PRODID:-//${(CONFIG.BUSINESS_NAME||"Running Coach").replace(/[\r\n]/g,"")}//Training Plan//EN`,
    "CALSCALE:GREGORIAN",
    ...vevents,
    "END:VCALENDAR"
  ].join("\r\n");
}
function downloadICS(content, filename){
  const blob = new Blob([content], { type:"text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 4000);
}
function addSessionToCalendar(a, week, session){
  const vevent = buildSessionVEvent(a, week, session);
  if(!vevent){
    toast("Couldn't work out a date for this session — ask your coach to check the week's start date and this session's day.");
    return;
  }
  const safeName = (session.type||"session").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  downloadICS(buildICS([vevent]), `${safeName}.ics`);
  toast("Calendar file downloaded — open it to add to your calendar");
}
function addWeekToCalendar(a, week){
  const vevents = (week.sessions||[]).map(s=>buildSessionVEvent(a, week, s)).filter(Boolean);
  if(!vevents.length){
    toast("No sessions with a recognised day yet — ask your coach to check the week's start date and session days.");
    return;
  }
  downloadICS(buildICS(vevents), `week-${week.weekNumber||""}-training.ics`);
  toast(`Calendar file downloaded with ${vevents.length} session${vevents.length===1?"":"s"}`);
}
/* Current streak = consecutive fully-completed weeks counting back from the
   athlete's current week (not counting an in-progress current week). */
function computeStreak(a){
  const weeks = getWeeks(a);
  const idx = Math.min(Math.max(a.currentWeekIndex||0,0), weeks.length-1);
  let streak = 0;
  for(let i=idx-1;i>=0;i--){
    const p = weekProgress(weeks[i]);
    if(p.total>0 && p.completed===p.total) streak++; else break;
  }
  return streak;
}
/* "This month" stats — uses each week's startDate to decide whether its
   completed sessions count toward the current calendar month. */
function computeMonthStats(a){
  const now = new Date();
  const weeks = getWeeks(a);
  let distance = 0, sessions = 0;
  weeks.forEach(w=>{
    if(!w.startDate) return;
    const d = new Date(w.startDate+"T00:00:00");
    if(isNaN(d) || d.getMonth()!==now.getMonth() || d.getFullYear()!==now.getFullYear()) return;
    (w.sessions||[]).forEach(s=>{
      if(s.completed){
        sessions++;
        distance += parseFloat(s.actual && s.actual.distance) || parseFloat(s.distance) || 0;
      }
    });
  });
  return { distance: Math.round(distance*10)/10, sessions };
}
function computeAchievements(a){
  const out = [];
  const streak = computeStreak(a);
  if(streak>=1) out.push(`${streak} Week Training Streak 🔥`);
  const weeks = getWeeks(a);
  let longestRun = 0;
  weeks.forEach(w=>(w.sessions||[]).forEach(s=>{
    if(s.completed){
      const d = parseFloat(s.actual && s.actual.distance) || parseFloat(s.distance) || 0;
      if(d>longestRun) longestRun = d;
    }
  }));
  if(longestRun>0) out.push(`Longest Run Completed: ${longestRun}km 🏅`);
  const month = computeMonthStats(a);
  if(month.distance>0) out.push(`${month.distance}km This Month 🚀`);
  const cw = getCurrentWeek(a);
  const cwp = weekProgress(cw);
  if(cw && cwp.total>0 && cwp.completed===cwp.total) out.push(`Week ${cw.weekNumber||""} Complete! 🎉`);
  return out;
}
function computeNeedsAttention(athletes){
  const now = Date.now();
  return athletes.filter(a=>{
    if(!isActiveAthlete(a)) return false;
    const checkins = a.checkins||[];
    if(!checkins.length) return true;
    const last = checkins.reduce((max,c)=>{ const t=new Date(c.date).getTime(); return t>max?t:max; }, 0);
    if(!last) return true;
    return (now-last) > 7*86400000;
  });
}
function computeUpcomingRaces(athletes, withinDays){
  withinDays = withinDays||30;
  return athletes.filter(a=>{
    const d = daysUntil(a.goalRaceDate);
    return d!=null && d>=0 && d<=withinDays;
  }).sort((x,y)=>daysUntil(x.goalRaceDate)-daysUntil(y.goalRaceDate));
}
function computeWeeklyCompletionRate(athletes){
  const active = athletes.filter(isActiveAthlete).filter(a=>getCurrentWeek(a));
  if(!active.length) return null;
  const total = active.reduce((sum,a)=>sum+weekProgress(getCurrentWeek(a)).pct,0);
  return Math.round(total/active.length);
}
function computeReminders(athletes){
  const now = Date.now();
  const reminders = [];
  athletes.forEach(a=>{
    if(!isActiveAthlete(a)) return;
    const checkins = a.checkins||[];
    const lastCheckin = checkins.reduce((max,c)=>{ const t=new Date(c.date).getTime(); return t>max?t:max; }, 0);
    if(!lastCheckin || (now-lastCheckin) > 7*86400000){
      reminders.push({ type:"Weekly check-in", athlete:a, dueText: lastCheckin ? `last check-in ${Math.floor((now-lastCheckin)/86400000)}d ago` : "no check-in logged yet" });
    }
    // Monthly catch-up reminder — must keep re-firing every ~30 days, not
    // just once ever. Reviews only carry a free-text "month" label (e.g.
    // "July 2026"), not a real date, so recency is tracked via a separate
    // createdAt timestamp stamped on each review when it's logged (see the
    // addReview handler in wireTab). Older reviews logged before that field
    // existed won't have one — those are treated as "unknown age" rather
    // than triggering a false "never reviewed" reminder.
    const reviews = a.reviews||[];
    if(a.startDate){
      const daysCoaching = Math.floor((now-new Date(a.startDate+"T00:00:00").getTime())/86400000);
      const lastReviewAt = reviews.reduce((max,r)=> r.createdAt && r.createdAt>max ? r.createdAt : max, 0);
      const daysSinceReview = lastReviewAt ? Math.floor((now-lastReviewAt)/86400000) : null;
      const overdue = reviews.length===0 || (daysSinceReview!=null && daysSinceReview>=30);
      if(daysCoaching>=27 && overdue){
        reminders.push({ type:"Monthly catch-up", athlete:a, dueText: reviews.length===0 ? `coaching ${daysCoaching}d, no review logged yet` : `last review ${daysSinceReview}d ago` });
      }
    }
  });
  return reminders;
}

const root = document.getElementById("app");
window.addEventListener("hashchange", render);
window.addEventListener("DOMContentLoaded", render);

async function render(){
  const { path, params } = parseHash();
  window.scrollTo(0,0);
  if(path === "/" || path === "") return renderLanding();
  if(path === "/inquiry") return renderInquiry();
  if(path === "/contact") return renderContact();
  if(path === "/questionnaire") return renderQuestionnaire(params.athlete||null);
  if(path === "/dashboard") return renderDashboardGate();
  if(path === "/dashboard/resources") return renderResourcesGate();
  if(path.startsWith("/dashboard/athlete/")) return renderDashboardGate(path.split("/").pop(), params);
  if(path === "/settings") return renderSettingsGate();
  if(path.startsWith("/athlete-view/")){
    const parts = path.split("/").filter(Boolean); // ["athlete-view", id, tab?]
    return renderAthleteViewGate(parts[1], parts[2]||"dashboard");
  }
  if(path === "/login") return renderAthleteLoginScreen();
  root.innerHTML = `<div class="container" style="padding:60px 0"><h2>Not found</h2><a href="#/">Back home</a></div>`;
}

function wireHeroMedia(){
  // Secondary photo (About section) — simple load/error swap.
  const aboutImg = document.getElementById("aboutPhoto");
  const aboutPlaceholder = document.getElementById("aboutPhotoPlaceholder");
  if(aboutImg){
    aboutImg.addEventListener("load", ()=>{ aboutImg.style.display="block"; if(aboutPlaceholder) aboutPlaceholder.style.display="none"; });
    aboutImg.addEventListener("error", ()=>{ aboutImg.style.display="none"; if(aboutPlaceholder) aboutPlaceholder.style.display="flex"; });
    if(aboutImg.complete && aboutImg.naturalWidth > 0){ aboutImg.style.display="block"; if(aboutPlaceholder) aboutPlaceholder.style.display="none"; }
  }

  // Hero background — video takes priority if it loads, else falls back to
  // the image, else falls back to the styled placeholder. Both are optional.
  const heroVideo = document.getElementById("heroVideo");
  const heroImg = document.getElementById("heroPhoto");
  const heroPlaceholder = document.getElementById("heroPhotoPlaceholder");
  let videoOk = false;

  function tryHeroImage(){
    if(videoOk || !heroImg) return;
    heroImg.addEventListener("load", ()=>{ if(!videoOk){ heroImg.style.display="block"; if(heroPlaceholder) heroPlaceholder.style.display="none"; } });
    heroImg.addEventListener("error", ()=>{ if(!videoOk){ heroImg.style.display="none"; if(heroPlaceholder) heroPlaceholder.style.display="flex"; } });
    if(heroImg.complete && heroImg.naturalWidth > 0){ heroImg.style.display="block"; if(heroPlaceholder) heroPlaceholder.style.display="none"; }
  }

  if(heroVideo){
    heroVideo.addEventListener("loadeddata", ()=>{
      videoOk = true;
      heroVideo.style.display = "block";
      if(heroImg) heroImg.style.display = "none";
      if(heroPlaceholder) heroPlaceholder.style.display = "none";
    });
    heroVideo.addEventListener("error", tryHeroImage);
    // Give the video a brief moment to fail before also trying the image,
    // in case both loadeddata and error never fire (e.g. empty src).
    setTimeout(tryHeroImage, 50);
  } else {
    tryHeroImage();
  }
}

function wireFaq(){

}

/* ============================================================
   GENERIC FORM RENDERING
   ============================================================ */
function fieldHtml(f, value){
  const val = value==null?"":value;
  const req = f.required ? "required" : "";
  if(f.type==="textarea"){
    return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label>
      <textarea name="${f.id}" ${req}>${esc(val)}</textarea></div>`;
  }
  if(f.type==="select"){
    const opts = (f.options||[]).map(o=>`<option value="${esc(o)}" ${val===o?"selected":""}>${esc(o)}</option>`).join("");
    return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label>
      <select name="${f.id}" ${req}><option value="">Select…</option>${opts}</select></div>`;
  }
  return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label>
    <input type="${f.type}" name="${f.id}" value="${esc(val)}" ${req}></div>`;
}
function readForm(formEl, fields){
  const data = {};
  fields.forEach(f=>{ data[f.id] = formEl.elements[f.id] ? formEl.elements[f.id].value.trim() : ""; });
  return data;
}

          <button class="btn btn-primary btn-block" type="submit">Submit questionnaire</button>
        </form>
      </div>
    </section>
    ${siteFooter()}
  `;
  document.getElementById("qForm").addEventListener("submit", async e=>{
    e.preventDefault();
    const form = e.target;
    const allFields = QUESTIONNAIRE_SECTIONS.flatMap(s=>s.fields);
    const data = readForm(form, allFields);
    const missing = allFields.filter(f=>f.required && !data[f.id]);
    if(missing.length){ toast("Please fill in the required fields"); return; }

    if(athleteId){
      try{
        await fetch(`/api/questionnaire/${encodeURIComponent(athleteId)}`, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(data) });
      }catch(e){ /* best effort — Formspree copy below still gets sent */ }
    } else {
      // Brand-new visitor going straight to the full questionnaire (no
      // existing athlete record yet) — create one from scratch.
      try{
        await fetch("/api/questionnaire", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(data) });
      }catch(e){ /* best effort — Formspree copy below still gets sent */ }
    }
    const fr = await submitToFormspree({ _subject:`Questionnaire: ${data.fullName||"unknown"}`, form:"questionnaire", athleteId: athleteId||"", ...data });
    showFormSuccess(fr, "Questionnaire received — thank you! I'll review this before we talk.");
  });

// Pace zones used to be a fixed object {Easy, Marathon, Threshold, Interval,
// Recovery}. Coaches wanted zone names they can rename or drop (not every
// athlete needs a Threshold zone, some coaches use different terminology),
// so this is now an editable array of {label, pace} rows. Old-format data
// (a plain object) is transparently migrated to the array the first time
// it's read.
function normalizePaceZones(a){
  const pz = a.plan && a.plan.paceZones;
  if(Array.isArray(pz)) return pz;
  const zoneKeys = ["Easy","Marathon","Threshold","Interval","Recovery"];
  if(pz && typeof pz==="object"){
    const fromOld = zoneKeys.filter(k=>pz[k]).map(k=>({label:k, pace:pz[k]}));
    return fromOld.length ? fromOld : zoneKeys.map(k=>({label:k, pace:""}));
  }
  return zoneKeys.map(k=>({label:k, pace:""}));
}

}
function openSessionModal(a, wi, si){
  const week = getWeeks(a)[wi];
  const existing = (si!=null && week.sessions[si]) ? week.sessions[si] : null;
  const s = existing || { day:"", type:"", distance:"", pace:"", description:"", warmup:"", main:"", cooldown:"", coachNotes:"" };
  const wrap = document.createElement("div");
  wrap.className = "modal-backdrop";
  wrap.innerHTML = `
    <div class="modal-box">
      <h3>${existing?"Edit session":"Add session"}</h3>
      <div class="grid2">
        <div class="field"><label>Day</label>
          <select id="smDay">
            <option value="">—</option>
            ${["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"].map(d=>`<option value="${d}" ${s.day===d?"selected":""}>${d}</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>Type</label><input type="text" id="smType" value="${esc(s.type)}" placeholder="Intervals / Long Run / Easy Run"></div>
        <div class="field"><label>Distance (km)</label><input type="text" id="smDistance" value="${esc(s.distance)}"></div>
        <div class="field"><label>Pace</label><input type="text" id="smPace" value="${esc(s.pace)}" placeholder="6:45-7:00/km"></div>
      </div>
      <div class="field"><label>Description</label><textarea id="smDesc">${esc(s.description)}</textarea></div>
      <div class="field"><label>Warm-up</label><textarea id="smWarmup">${esc(s.warmup)}</textarea></div>
      <div class="field"><label>Main session</label><textarea id="smMain">${esc(s.main)}</textarea></div>
      <div class="field"><label>Cool-down</label><textarea id="smCooldown">${esc(s.cooldown)}</textarea></div>
      <div class="field"><label>Coach notes</label><textarea id="smCoachNotes">${esc(s.coachNotes)}</textarea></div>
      <div class="row-actions">
        <button class="btn btn-primary" id="smSave">${existing?"Save changes":"Add session"}</button>
        <button class="btn btn-secondary" id="smCancel">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  wrap.querySelector("#smCancel").addEventListener("click", ()=>wrap.remove());
  wrap.querySelector("#smSave").addEventListener("click", async ()=>{
    const type = document.getElementById("smType").value.trim();
    if(!type){ toast("Session type required"); return; }
    const data = {
      id: existing ? existing.id : uid(),
      day: document.getElementById("smDay").value.trim(),
      type,
      distance: document.getElementById("smDistance").value.trim(),
      pace: document.getElementById("smPace").value.trim(),
      description: document.getElementById("smDesc").value.trim(),
      warmup: document.getElementById("smWarmup").value.trim(),
      main: document.getElementById("smMain").value.trim(),
      cooldown: document.getElementById("smCooldown").value.trim(),
      coachNotes: document.getElementById("smCoachNotes").value.trim(),
      completed: existing ? existing.completed : false,
      actual: existing ? existing.actual : {distance:"",time:"",rpe:"",notes:""}
    };
    if(existing){ week.sessions[si] = data; } else { week.sessions = week.sessions||[]; week.sessions.push(data); }
    await dbPut(a);
    wrap.remove();
    toast(existing?"Session updated":"Session added");
    renderTab(a);
  });
}

async function renderStravaOverviewBox(a){
  const box = document.getElementById("stravaOverviewBox");
  if(!box) return;
  if(!stravaEnabled()){
    box.innerHTML = `<p class="muted">Not set up yet — deploy the Worker in <code>strava-worker/</code> and paste its URL into <code>CONFIG.STRAVA_WORKER_URL</code>.</p>`;
    return;
  }
  const status = await fetchStravaStatus(a.id);
  if(status.error){
    box.innerHTML = `<p class="muted">Couldn't reach the Strava Worker — check the URL in CONFIG and that it's deployed.</p>`;
    return;
  }
  if(status.connected){
    box.innerHTML = `
      <p>Connected as <strong>${esc(status.athleteName||"Strava athlete")}</strong>.</p>
      <button class="btn btn-secondary btn-sm" id="stravaDisconnectBtn">Disconnect</button>`;
    document.getElementById("stravaDisconnectBtn").addEventListener("click", async ()=>{
      await disconnectStrava(a.id); toast("Strava disconnected"); renderStravaOverviewBox(a);
    });
  } else {
    box.innerHTML = `
      <p class="muted">Not connected yet. Send the athlete this link, or connect on their behalf.</p>
      <a class="btn btn-moss btn-sm" href="${esc(stravaConnectUrl(a.id))}">Connect Strava</a>`;
  }
}

async function renderStravaCheckinBox(a){
  const box = document.getElementById("stravaCheckinBox");
  if(!box) return;
  box.innerHTML = `<p class="muted">Checking connection…</p>`;
  if(!stravaEnabled()){
    box.innerHTML = `<p class="muted">Not set up yet — see the Strava setup guide in <code>strava-worker/SETUP.md</code>.</p>`;
    return;
  }
  const status = await fetchStravaStatus(a.id);
  if(status.error){
    box.innerHTML = `<p class="muted">Couldn't reach the Strava Worker right now.</p>`;
    return;
  }
  if(!status.connected){
    box.innerHTML = `<p class="muted">Athlete hasn't connected Strava yet — see the Overview tab to send them a connect link.</p>`;
    return;
  }
  const activities = status.activities||[];
  if(!activities.length){
    box.innerHTML = `<p class="muted">Connected, but no recent runs found yet.</p>`;
    return;
  }
  box.innerHTML = `
    <table class="simple">
      <tr><th>Date</th><th>Activity</th><th>Distance</th><th>Time</th><th>Pace</th></tr>
      ${activities.map(act=>`
        <tr>
          <td>${esc(new Date(act.date).toLocaleDateString())}</td>
          <td>${esc(act.name)}</td>
          <td>${act.distanceKm} km</td>
          <td>${act.movingTimeMin} min</td>
          <td>${paceLabel(act.avgPaceMinPerKm)}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

function wireTab(tab, a){
  document.querySelectorAll(".copyBtn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      navigator.clipboard.writeText(btn.dataset.text).then(()=>toast("Copied"));
    });
  });
  if(tab==="overview"){
    document.getElementById("ovSave").addEventListener("click", async ()=>{
      a.name = document.getElementById("ovName").value.trim();
      a.age = document.getElementById("ovAge").value.trim();
      a.email = document.getElementById("ovEmail").value.trim();
      a.phone = document.getElementById("ovPhone").value.trim();
      a.experience = document.getElementById("ovExperience").value.trim();
      a.trainingPhase = document.getElementById("ovPhase").value.trim();
      a.goalRace = document.getElementById("ovGoalRace").value.trim();
      a.goalRaceDate = document.getElementById("ovGoalRaceDate").value;
      a.goalTime = document.getElementById("ovGoalTime").value.trim();
      a.startDate = document.getElementById("ovStartDate").value;
      a.availability = document.getElementById("ovAvailability").value.trim();
      await dbPut(a); toast("Saved"); renderAthleteProfile(a);
    });
    document.getElementById("ovPaymentSave").addEventListener("click", async ()=>{
      a.paymentStatus = document.getElementById("ovPaymentStatus").value;
      await dbPut(a); toast("Payment status saved"); renderAthleteProfile(a);
    });
    document.getElementById("tbSave").addEventListener("click", async ()=>{
      a.welcomeMessage = document.getElementById("tbWelcome").value.trim();
      a.recentRacePerformance = document.getElementById("tbRecentRace").value.trim();
      a.currentWeeklyVolume = document.getElementById("tbWeeklyVolume").value.trim();
      a.currentFocusAreas = document.getElementById("tbFocusAreas").value.split("\n").map(s=>s.trim()).filter(Boolean);
      a.goalA = document.getElementById("tbGoalA").value.trim();
      a.goalB = document.getElementById("tbGoalB").value.trim();
      a.goalC = document.getElementById("tbGoalC").value.trim();
      await dbPut(a); toast("Training block overview saved");
    });
    document.getElementById("msgSave").addEventListener("click", async ()=>{
      const text = document.getElementById("msgText").value.trim();
      if(!text){ toast("Write a message first"); return; }
      a.messages = a.messages||[];
      a.messages.push({ date: new Date().toISOString().slice(0,10), text });
      await dbPut(a); toast("Message saved"); renderTab(a);
    });
    const setPwBtn = document.getElementById("setPasswordBtn");
    if(setPwBtn) setPwBtn.addEventListener("click", ()=>openSetAthletePasswordModal(a));
    renderStravaOverviewBox(a);
  }
  if(tab==="raceprep"){
    document.querySelectorAll("[data-check]").forEach(cb=>{
      cb.addEventListener("change", async ()=>{
        a.raceChecklist = a.raceChecklist||{};
        a.raceChecklist[cb.dataset.check] = cb.checked;
        await dbPut(a); toast("Saved");
      });
    });
    document.getElementById("rnSave").addEventListener("click", async ()=>{
      a.raceNotes = {
        targetPace: document.getElementById("rnPace").value.trim(),
        nutritionPlan: document.getElementById("rnNutrition").value.trim(),
        pacingStrategy: document.getElementById("rnPacing").value.trim(),
        raceDayReminders: document.getElementById("rnReminders").value.trim()
      };
      await dbPut(a); toast("Race notes saved");
    });
  }
  if(tab==="progress"){
    document.getElementById("pbSave").addEventListener("click", async ()=>{
      const pbs = {};
      document.querySelectorAll("[data-pb-cur]").forEach(inp=>{
        const k = inp.dataset.pbCur;
        const prevInp = document.querySelector(`[data-pb-prev="${k}"]`);
        pbs[k] = { current: inp.value.trim(), previous: prevInp ? prevInp.value.trim() : "" };
      });
      a.personalBests = pbs;
      await dbPut(a); toast("Personal bests saved");
    });
  }
  if(tab==="discovery"){
    document.getElementById("saveDiscovery").addEventListener("click", async ()=>{
      a.discoveryNotes = document.getElementById("discoveryNotes").value;
      await dbPut(a); toast("Notes saved");
    });
  }
  if(tab==="plan"){
    document.getElementById("saveZones").addEventListener("click", async ()=>{
      const rows = document.querySelectorAll("#paceZoneRows [data-zi]");
      const zones = Array.from(rows).map(row=>{
        const zi = row.dataset.zi;
        const label = document.querySelector(`.zoneLabel[data-zi="${zi}"]`).value.trim();
        const pace = document.querySelector(`.zonePace[data-zi="${zi}"]`).value.trim();
        return { label, pace };
      }).filter(z=>z.label);
      a.plan = a.plan || {weeks:[],paceZones:[]};
      a.plan.paceZones = zones;
      await dbPut(a); toast("Pace zones saved");
    });
    document.getElementById("addZoneBtn").addEventListener("click", ()=>{
      a.plan = a.plan || {weeks:[],paceZones:[]};
      const zones = normalizePaceZones(a);
      zones.push({label:"", pace:""});
      a.plan.paceZones = zones;
      renderTab(a);
    });
    document.querySelectorAll(".removeZone").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const zones = normalizePaceZones(a);
        zones.splice(parseInt(btn.dataset.zi,10),1);
        a.plan = a.plan || {weeks:[],paceZones:[]};
        a.plan.paceZones = zones;
        renderTab(a);
      });
    });
    document.getElementById("addWeekBtn").addEventListener("click", async ()=>{
      a.plan = a.plan || {weeks:[],paceZones:{}};
      a.plan.weeks = a.plan.weeks||[];
      const nextNum = a.plan.weeks.length ? Math.max(...a.plan.weeks.map(w=>w.weekNumber||0))+1 : 1;
      a.plan.weeks.push({ id: uid(), weekNumber: nextNum, startDate: new Date().toISOString().slice(0,10), coachFocus:"", sessions:[] });
      await dbPut(a); toast("Week added"); renderTab(a);
    });
    document.querySelectorAll(".weekStartDate").forEach(inp=>{
      inp.addEventListener("change", async ()=>{
        const wi = parseInt(inp.dataset.wi,10);
        a.plan.weeks[wi].startDate = inp.value;
        await dbPut(a); toast("Week start date saved");
      });
    });
    document.querySelectorAll(".setCurrentWeek").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        a.currentWeekIndex = parseInt(btn.dataset.wi,10);
        await dbPut(a); toast("Current week updated"); renderTab(a);
      });
    });
    document.querySelectorAll(".removeWeek").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        if(!confirm("Remove this week and its sessions?")) return;
        const wi = parseInt(btn.dataset.wi,10);
        a.plan.weeks.splice(wi,1);
        if(a.currentWeekIndex >= a.plan.weeks.length) a.currentWeekIndex = Math.max(0,a.plan.weeks.length-1);
        await dbPut(a); renderTab(a);
      });
    });
    document.querySelectorAll(".saveWeekFocus").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const wi = parseInt(btn.dataset.wi,10);
        const ta = document.querySelector(`.weekFocus[data-wi="${wi}"]`);
        a.plan.weeks[wi].coachFocus = ta.value.trim();
        await dbPut(a); toast("Focus saved");
      });
    });
    document.querySelectorAll(".addSessionBtn").forEach(btn=>{
      btn.addEventListener("click", ()=>openSessionModal(a, parseInt(btn.dataset.wi,10), null));
    });
    document.querySelectorAll(".editSession").forEach(btn=>{
      btn.addEventListener("click", ()=>openSessionModal(a, parseInt(btn.dataset.wi,10), parseInt(btn.dataset.si,10)));
    });
    document.querySelectorAll(".removeSession").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        const wi = parseInt(btn.dataset.wi,10), si = parseInt(btn.dataset.si,10);
        a.plan.weeks[wi].sessions.splice(si,1);
        await dbPut(a); renderTab(a);
      });
    });
  }
  if(tab==="checkins"){
    document.getElementById("addCheckin").addEventListener("click", async ()=>{
      const date = document.getElementById("ciDate").value;
      const notes = document.getElementById("ciNotes").value.trim();
      if(!notes){ toast("Add some notes first"); return; }
      a.checkins = a.checkins||[];
      a.checkins.push({date,notes});
      await dbPut(a); toast("Check-in logged"); renderTab(a);
    });
    document.getElementById("stravaRefreshBtn").addEventListener("click", ()=>renderStravaCheckinBox(a));
    renderStravaCheckinBox(a);
  }
  if(tab==="reviews"){
    document.getElementById("addReview").addEventListener("click", async ()=>{
      const month = document.getElementById("rvMonth").value.trim();
      const notes = document.getElementById("rvNotes").value.trim();
      if(!month || !notes){ toast("Fill in month and notes"); return; }
      a.reviews = a.reviews||[];
      a.reviews.push({month,notes,createdAt:Date.now()});
      await dbPut(a); toast("Review logged"); renderTab(a);
    });
  }
  if(tab==="debrief"){
    document.getElementById("saveDebrief").addEventListener("click", async ()=>{
      a.debrief = {
        raceName: document.getElementById("dbRace").value.trim(),
        date: document.getElementById("dbDate").value,
        result: document.getElementById("dbResult").value.trim(),
        notes: document.getElementById("dbNotes").value.trim(),
        testimonial: document.getElementById("dbTestimonial").value.trim()
      };
      await dbPut(a); toast("Debrief saved");
    });
  }
}

            <p class="muted">Give an athlete one of these codes to unlock their dashboard for free without payment — handy for giveaways or trial runners. They enter it on their "payment required" screen.</p>
            <div id="accessCodesList">
              ${accessCodes.length ? `
                <table class="simple">
                  <tr><th>Code</th><th>Label</th><th>Uses</th><th>Status</th><th></th></tr>
                  ${accessCodes.map((c,ci)=>`
                    <tr>
                      <td><strong>${esc(c.code)}</strong></td>
                      <td>${esc(c.label||"—")}</td>
                      <td>${c.usedCount||0}${c.maxUses?` / ${c.maxUses}`:" (unlimited)"}</td>
                      <td>${c.active===false?"Inactive":"Active"}</td>
                      <td><button class="btn btn-ghost btn-sm toggleCodeBtn" data-ci="${ci}">${c.active===false?"Activate":"Deactivate"}</button> <button class="btn btn-ghost btn-sm deleteCodeBtn" data-ci="${ci}">Delete</button></td>
                    </tr>
                  `).join("")}
                </table>
              ` : `<p class="muted">No access codes yet.</p>`}
            </div>
            <div class="grid2" style="margin-top:12px;">
              <div class="field"><label>Code</label><input type="text" id="newCode" placeholder="e.g. WELCOME2026"></div>
              <div class="field"><label>Label (optional)</label><input type="text" id="newCodeLabel" placeholder="e.g. Instagram giveaway"></div>
              <div class="field"><label>Max uses (optional)</label><input type="number" id="newCodeMaxUses" min="1" placeholder="Leave blank for unlimited"></div>
            </div>
            <button class="btn btn-secondary btn-sm" id="addCodeBtn">Add code</button>
          </div>
          <div class="card">
            <h3>Backup</h3>
            <p class="muted">Export regularly as an extra safety net alongside the database's own backups.</p>
            <div class="row-actions">
              <button class="btn btn-primary btn-sm" id="exportBtn">Export JSON</button>
              <label class="btn btn-secondary btn-sm" for="importFile" style="cursor:pointer;">Import JSON</label>
              <input type="file" id="importFile" accept="application/json" style="display:none;">
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById("coachLogoutLink").addEventListener("click", ()=>{ clearSession(); location.hash="#/"; });
  document.getElementById("changeEmailBtn").addEventListener("click", async ()=>{
    const newEmail = document.getElementById("newEmail").value.trim();
    const currentPassword = document.getElementById("emailCurPw").value;
    if(!newEmail || !newEmail.includes("@")){ toast("Enter a valid email"); return; }
    if(!currentPassword){ toast("Enter your current password to confirm"); return; }
    try{
      await apiFetch("/api/coach/email", { method:"PUT", body: JSON.stringify({ currentPassword, newEmail }) });
      toast("Login email updated — use it next time you sign in");
      document.getElementById("newEmail").value = "";
      document.getElementById("emailCurPw").value = "";
    }catch(e){
      toast(e.message || "Couldn't update email");
    }
  });
  async function saveAccessCodes(codes){
    await apiFetch("/api/coach/settings", { method:"PUT", body: JSON.stringify({ accessCodes: codes }) });
    renderSettings();
  }
  document.getElementById("addCodeBtn").addEventListener("click", async ()=>{
    const code = document.getElementById("newCode").value.trim();
    if(!code){ toast("Enter a code"); return; }
    const label = document.getElementById("newCodeLabel").value.trim();
    const maxUsesRaw = document.getElementById("newCodeMaxUses").value;
    const maxUses = maxUsesRaw ? parseInt(maxUsesRaw,10) : 0;
    const codes = [...accessCodes, { code, label, maxUses, usedCount:0, active:true }];
    await saveAccessCodes(codes);
    toast("Access code added");
  });
  document.querySelectorAll(".toggleCodeBtn").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      const codes = accessCodes.map((c,i)=> i===ci ? {...c, active: c.active===false} : c);
      await saveAccessCodes(codes);
    });
  });
  document.querySelectorAll(".deleteCodeBtn").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      const ci = parseInt(btn.dataset.ci,10);
      const codes = accessCodes.filter((c,i)=>i!==ci);
      await saveAccessCodes(codes);
      toast("Access code removed");
    });
  });
  document.getElementById("changePwBtn").addEventListener("click", async ()=>{
    const current = document.getElementById("curPw").value;
    const next = document.getElementById("newPw").value;
    const conf = document.getElementById("confPw").value;
    if(next.length<8){ toast("New password should be at least 8 characters"); return; }
    if(next!==conf){ toast("New passwords don't match"); return; }
    try{
      await apiFetch("/api/coach/password", { method:"PUT", body: JSON.stringify({ currentPassword:current, newPassword:next }) });
      toast("Password updated");
      document.getElementById("curPw").value = "";
      document.getElementById("newPw").value = "";
      document.getElementById("confPw").value = "";
    }catch(e){
      toast(e.message || "Couldn't update password");
    }
  });
  document.getElementById("exportBtn").addEventListener("click", async ()=>{
    const athletes = await dbGetAll();
    const blob = new Blob([JSON.stringify({ exportedAt:new Date().toISOString(), athletes },null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `running-coach-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  });
  document.getElementById("importFile").addEventListener("change", async e=>{
    const file = e.target.files[0];
    if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      const athletes = data.athletes || data;
      if(!Array.isArray(athletes)) throw new Error("bad format");
      for(const a of athletes){ await dbPut(a); }
      toast(`Imported ${athletes.length} athlete(s)`);
    }catch(err){
      toast("Import failed — invalid file");
    }
  });
}

      <div class="dash-body">

                <div class="meta">${esc(r.category||"General")}</div>

                <div class="row-actions">
                  <button class="btn btn-ghost btn-sm copyBtn" data-text="${esc(r.body||"")}">Copy</button>
                  <button class="btn btn-ghost btn-sm removeResource" data-id="${esc(r.id)}">Remove</button>
                </div>
              </div>
            `).join("") : `<p class="muted">No resources yet — files/content need to be created by you, then added here as text or links.</p>`}
          </div>
        </div>
      </div>

  `;
  document.querySelectorAll(".copyBtn").forEach(btn=>{

  });
  document.getElementById("addResourceBtn").addEventListener("click", ()=>openResourceModal());
  document.getElementById("coachLogoutLink").addEventListener("click", ()=>{ clearSession(); location.hash="#/"; });

    btn.addEventListener("click", async ()=>{
