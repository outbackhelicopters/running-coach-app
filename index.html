<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Coach — Athlete Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:   #0A1930;
    --paper: #F1EEE2;
    --card:  #FFFFFF;
    --rust:  #FF5A4E;
    --moss:  #17B6C4;
    --dusk:  #123A5E;
    --navy-deep: #050C18;
    --gold:   #FFD23F;
    --orange: #FF9F1C;
    --line: rgba(10,25,48,0.12);
    --shadow: 0 1px 2px rgba(10,25,48,0.06), 0 4px 16px rgba(10,25,48,0.06);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:var(--dusk);}
  h1,h2,h3,h4{font-family:'Space Grotesk',Inter,-apple-system,sans-serif;font-weight:700;margin:0 0 .4em;line-height:1.18;letter-spacing:-.01em;}
  h1{font-size:2.4rem;}
  h2{font-size:1.6rem;}
  h3{font-size:1.2rem;}
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important;animation-iteration-count:1 !important;transition-duration:0.001ms !important;}
  }
  p{margin:0 0 1em;}
  .muted{color:rgba(10,25,48,0.6);font-size:.92rem;}
  .container{max-width:1080px;margin:0 auto;padding:0 24px;}
  .narrow{max-width:640px;}
  /* nav */
  header.site{
    position:sticky;top:0;z-index:20;
    background:rgba(241,238,226,0.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid var(--line);
  }
  header.site .bar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;max-width:1080px;margin:0 auto;}
  header.site .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem;color:var(--ink);text-decoration:none;}
  header.site nav a{margin-left:18px;text-decoration:none;color:var(--ink);font-size:.92rem;font-weight:600;}
  header.site nav a.cta{background:var(--rust);color:#fff;padding:8px 16px;border-radius:8px;}
  /* buttons */
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:13px 24px;border-radius:11px;border:1px solid transparent;
    font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;
    font-family:inherit;transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
  }
  .btn-primary{background:var(--rust);color:#fff;box-shadow:0 6px 16px rgba(255,90,78,0.25);}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 22px rgba(255,90,78,0.32);}
  .btn-secondary{background:transparent;color:var(--ink);border-color:var(--line);}
  .btn-secondary:hover{background:rgba(10,25,48,0.05);transform:translateY(-2px);}
  .btn-moss{background:var(--moss);color:#fff;}
  .btn-ghost{background:transparent;color:var(--dusk);padding:6px 10px;}
  .btn-danger{background:transparent;color:#a3402a;border-color:#a3402a;}
  .btn-sm{padding:6px 12px;font-size:.82rem;}
  .btn-block{width:100%;}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:22px;box-shadow:var(--shadow);}

  /* ============================================================
     HERO — dark, dynamic, 3D
     ============================================================ */
  .hero-dark{
    position:relative;
    overflow:hidden;
    background:linear-gradient(180deg, #0D2039 0%, var(--ink) 55%, var(--navy-deep) 100%);
    padding:64px 0 0;
    color:#fff;
  }
  .hero-blob{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;}
  .hero-blob.b1{width:460px;height:460px;background:var(--moss);opacity:.16;top:-180px;right:-140px;animation:blobDrift 20s ease-in-out infinite;}
  .hero-blob.b2{width:380px;height:380px;background:var(--rust);opacity:.12;bottom:-180px;left:-120px;animation:blobDrift 24s ease-in-out infinite reverse;}
  @keyframes blobDrift{
    0%,100%{transform:translate(0,0) scale(1);}
    50%{transform:translate(20px,-14px) scale(1.06);}
  }
  .hero-grid{
    position:relative;z-index:1;
    display:grid;grid-template-columns:1fr;gap:36px;
    padding-bottom:44px;
  }
  @media(min-width:900px){
    .hero-grid{grid-template-columns:1.05fr .95fr;align-items:center;gap:28px;}
  }
  .hero-eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);
    color:rgba(255,255,255,0.85);font-weight:600;letter-spacing:.03em;
    font-size:.78rem;padding:6px 14px;border-radius:30px;margin-bottom:20px;
  }
  .hero-eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--moss);display:inline-block;}
  .hero-dark h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    letter-spacing:-.01em;
    font-size:clamp(2.1rem, 5.2vw, 3.4rem);
    line-height:1.12;
    margin:0 0 .4em;
    color:#fff;
  }
  .hero-dark h1 .hl{color:var(--moss);}
  .hero-dark p.tagline{font-size:1.08rem;max-width:500px;color:rgba(255,255,255,0.68);}
  .hero-dark .actions{margin-top:28px;display:flex;gap:12px;flex-wrap:wrap;}
  .btn-outline-light{background:transparent;color:#fff;border:1px solid rgba(255,255,255,0.3);}
  .btn-outline-light:hover{background:rgba(255,255,255,0.08);transform:translateY(-2px);}
  .hero-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px;}
  .hero-chip{
    font-size:.78rem;font-weight:600;color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.12);padding:6px 12px;border-radius:8px;
  }
  .hero-chip span{color:var(--moss);}

  /* visual column: photo + video */
  .hero-visual{position:relative;display:flex;flex-direction:column;gap:20px;align-items:center;}
  .photo-frame{
    position:relative;width:min(320px,78vw);aspect-ratio:4/5;border-radius:16px;overflow:hidden;
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:0 24px 48px rgba(0,0,0,0.5), 0 0 40px rgba(23,182,196,0.08);
    transform:perspective(1200px) rotateY(-5deg) rotateX(2deg);
    animation:floaty 7s ease-in-out infinite;
    background:linear-gradient(160deg, #12253F, #0B1A2E);
  }
  .photo-frame img{width:100%;height:100%;object-fit:cover;display:block;}
  .photo-frame .photo-placeholder{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:8px;text-align:center;padding:20px;color:rgba(255,255,255,0.5);font-size:.82rem;font-weight:500;
  }
  .photo-frame .photo-placeholder code{color:rgba(255,255,255,0.7);}
  .photo-frame .photo-placeholder .icon{font-size:1.8rem;opacity:.7;}
  @keyframes floaty{
    0%,100%{transform:perspective(1200px) rotateY(-5deg) rotateX(2deg) translateY(0);}
    50%{transform:perspective(1200px) rotateY(-5deg) rotateX(2deg) translateY(-10px);}
  }
  .photo-badge{
    position:absolute;bottom:14px;left:14px;
    background:rgba(5,12,24,0.75);backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,0.15);border-radius:8px;
    padding:7px 12px;z-index:3;
  }
  .photo-badge span{
    color:#fff;font-size:.72rem;font-weight:600;letter-spacing:.01em;
    display:flex;align-items:center;gap:6px;
  }
  .photo-badge span::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--moss);display:inline-block;}

  .video-card{
    position:relative;width:min(320px,78vw);aspect-ratio:16/10;border-radius:14px;overflow:hidden;
    border:1px solid rgba(255,255,255,0.14);
    background:rgba(255,255,255,0.03);
    box-shadow:0 14px 32px rgba(0,0,0,0.35);
  }
  .video-card video{width:100%;height:100%;object-fit:cover;display:block;}
  .video-placeholder{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
    color:rgba(255,255,255,0.75);text-align:center;padding:16px;transition:opacity .3s ease;
  }
  .video-placeholder .play-dot{
    width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;
    font-size:.95rem;color:rgba(255,255,255,0.7);
  }
  .video-placeholder .label{font-size:.8rem;font-weight:600;letter-spacing:.01em;}
  .video-placeholder .sub{font-size:.7rem;color:rgba(255,255,255,0.4);}

  /* marquee ticker */
  .marquee-wrap{
    position:relative;overflow:hidden;
    background:var(--navy-deep);
    border-top:1px solid rgba(255,255,255,0.08);
  }
  .marquee-track{
    display:flex;white-space:nowrap;padding:11px 0;
    animation:marqueeScroll 26s linear infinite;
  }
  .marquee-track span{
    font-family:'Inter',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.03em;
    color:rgba(255,255,255,0.6);padding:0 22px;
  }
  .marquee-track span b{color:var(--moss);font-weight:700;}
  @keyframes marqueeScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  /* process */
  .process{padding:60px 0 64px;}
  .stage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-top:24px;}
  .stage-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px;transition:transform .2s ease, box-shadow .2s ease;}
  .stage-card:hover{transform:translateY(-4px);box-shadow:0 16px 32px rgba(10,25,48,0.12);}
  .stage-card .num{
    display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;
    background:var(--ink);color:#fff;font-size:.78rem;font-weight:700;margin-bottom:10px;
  }
  .stage-card h4{margin-bottom:4px;font-size:1rem;}
  .stage-card p{font-size:.85rem;color:rgba(10,25,48,0.65);margin:0;}
  footer.site{border-top:1px solid var(--line);padding:28px 0;margin-top:40px;}
  footer.site .container{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;font-size:.85rem;color:rgba(10,25,48,0.6);}
  /* forms */
  .form-page{padding:40px 0 80px;}
  .field{margin-bottom:18px;}
  .field label{display:block;font-weight:600;font-size:.88rem;margin-bottom:6px;}
  .field .hint{font-size:.78rem;color:rgba(10,25,48,0.55);margin-top:4px;}
  input[type=text],input[type=email],input[type=tel],input[type=date],input[type=number],input[type=password],select,textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:.95rem;font-family:inherit;background:#fff;color:var(--ink);
  }
  textarea{min-height:90px;resize:vertical;}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--dusk);outline-offset:1px;}
  fieldset{border:1px solid var(--line);border-radius:12px;padding:18px 18px 4px;margin:0 0 24px;}
  legend{font-family:'Space Grotesk',sans-serif;font-weight:600;padding:0 8px;font-size:1.05rem;}
  .success-box{background:var(--card);border:1px solid var(--moss);border-radius:12px;padding:28px;text-align:center;}
  .success-box h2{color:var(--moss);}
  /* dashboard */
  .dash-shell{min-height:100vh;}
  .dash-top{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--line);background:var(--card);}
  .dash-top .brand{font-family:'Space Grotesk',sans-serif;font-weight:700;}
  .dash-body{padding:24px;}
  .pipeline{display:flex;gap:14px;overflow-x:auto;padding-bottom:20px;}
  .stage-col{flex:0 0 250px;background:rgba(10,25,48,0.03);border:1px solid var(--line);border-radius:12px;padding:12px;}
  .stage-col h4{font-size:.85rem;text-transform:uppercase;letter-spacing:.04em;color:rgba(10,25,48,0.65);display:flex;justify-content:space-between;margin-bottom:10px;}
  .stage-col h4 .count{background:var(--ink);color:var(--paper);border-radius:20px;padding:1px 8px;font-size:.72rem;}
  .athlete-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow);}
  .athlete-card:hover{border-color:var(--rust);}
  .athlete-card .name{font-weight:700;font-size:.92rem;}
  .athlete-card .sub{font-size:.76rem;color:rgba(10,25,48,0.55);}
  .empty-col{font-size:.78rem;color:rgba(10,25,48,0.4);padding:8px 4px;}
  .pin-gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .pin-box{max-width:340px;width:100%;text-align:center;}
  .pin-dots{display:flex;gap:10px;justify-content:center;margin:18px 0;}
  .pin-dots span{width:14px;height:14px;border-radius:50%;border:1px solid var(--ink);}
  .pin-dots span.filled{background:var(--ink);}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
  .tag{display:inline-block;background:rgba(23,182,196,0.15);color:var(--moss);border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:700;}
  /* profile */
  .profile-head{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:16px;margin-bottom:20px;}
  .tabs{display:flex;gap:4px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-bottom:20px;}
  .tab-btn{background:none;border:none;padding:10px 14px;font-size:.88rem;font-weight:600;color:rgba(10,25,48,0.55);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;}
  .tab-btn.active{color:var(--ink);border-color:var(--rust);}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  @media(max-width:720px){.grid2{grid-template-columns:1fr;}}
  table.simple{width:100%;border-collapse:collapse;font-size:.88rem;}
  table.simple th,table.simple td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);}
  .template-box{background:#fff;border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:14px;white-space:pre-wrap;font-size:.88rem;}
  .template-actions{display:flex;gap:8px;margin-top:8px;}
  .list-item{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fff;}
  .list-item .meta{font-size:.75rem;color:rgba(10,25,48,0.5);margin-bottom:4px;}
  .row-actions{display:flex;gap:8px;margin-top:16px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:10px 18px;border-radius:8px;font-size:.85rem;z-index:100;box-shadow:var(--shadow);}
  .link-btn{background:none;border:none;color:var(--dusk);font-weight:600;cursor:pointer;font-size:.85rem;padding:0;font-family:inherit;}
  select.stage-select{width:auto;font-weight:700;}
  .badge-demo{background:var(--rust);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:20px;font-weight:700;letter-spacing:.03em;margin-left:8px;vertical-align:middle;}
  .modal-backdrop{position:fixed;inset:0;background:rgba(10,25,48,0.5);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal-box{background:var(--card);border-radius:14px;padding:26px;max-width:480px;width:100%;max-height:85vh;overflow:auto;}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================================================
   CONFIG — edit these values for your business
   ============================================================ */
const CONFIG = {
  BUSINESS_NAME: "Tom McGookin Running",
  COACH_NAME: "Tom McGookin",
  COACH_FIRST: "Tom",
  TAGLINE: "Personalised run coaching, built around your life and your goal race.",
  FORMSPREE_ENDPOINT: "",
  CONTACT_EMAIL: "coach@example.com",
  WHATSAPP_NUMBER: "",
  /* Drop your own files at these paths (same folder as index.html) and the
     hero will pick them up automatically — no code changes needed.
     HERO_IMAGE: a photo of Tom, portrait-ish crop works best (e.g. 1000x1250px).
     HERO_VIDEO: a short muted clip (mp4, ideally under ~15MB) of Tom running.
     Until the files exist, both show a styled placeholder instead of breaking. */
  HERO_IMAGE: "assets/hero-photo.jpg",
  HERO_VIDEO: "assets/tom-running.mp4",
  HERO_BADGE: "Now Coaching",
  /* Strava (optional) — leave blank to hide all Strava features.
     STRAVA_WORKER_URL is the address of the small Cloudflare Worker that
     handles the OAuth token exchange (your Strava Client Secret can never
     live in this static file). See strava-worker/SETUP.md for the full
     step-by-step: create a Strava API app, deploy the Worker, paste its
     URL here. e.g. "https://running-coach-strava.yourname.workers.dev" */
  STRAVA_WORKER_URL: "",
  STAGES: [
    "New Inquiry",
    "Questionnaire Sent",
    "Questionnaire Completed",
    "Discovery Call Booked",
    "Discovery Call Completed",
    "Plan Built",
    "Active Coaching",
    "Race Week",
    "Debrief & Testimonial"
  ],
  STAGE_BLURBS: [
    "You reach out, I reply within a day and send over the athlete questionnaire.",
    "Questionnaire link is in your inbox — running history, lifestyle, medical, goal.",
    "I review your answers before we speak, so the call is useful, not generic.",
    "A free 20-30 min call to talk through your goal race and how coaching works.",
    "We've spoken — I'm building your first training block and pace zones.",
    "Your plan is ready: sessions, pace zones, and how we'll communicate weekly.",
    "Weekly check-ins and monthly reviews keep the plan matched to your life.",
    "Final week before race day — taper, logistics, and last-minute questions.",
    "We debrief the race, capture lessons, and (hopefully) grab a testimonial."
  ]
};

/* Demo notice: this is a placeholder build — stage names, message scripts,
   and questionnaire wording are generic defaults. Edit TEMPLATES, STAGES
   and QUESTIONNAIRE_SECTIONS below once you share your real scripts. */
const IS_DEMO = true;

/* ============================================================
   MESSAGE TEMPLATES (placeholder scripts — replace with your own)
   ============================================================ */
function qLink(athleteId){
  return location.origin + location.pathname + "#/questionnaire?athlete=" + athleteId;
}
const TEMPLATES = [
  { key:"inquiryAck", label:"Reply to new inquiry", stage:0,
    text:(a)=>`Hey ${a.first}! Thanks so much for reaching out about coaching 🙌\n\nBefore we jump on a call, I'd love to get a bit more detail on your running background and goals — I'll send over a quick questionnaire now. Shouldn't take more than 10 minutes.\n\nOnce I've had a look, I'll follow up to book in a free discovery call so we can chat through a plan that fits your life.\n\n— ${CONFIG.COACH_FIRST}` },
  { key:"sendQuestionnaire", label:"Send questionnaire", stage:1,
    text:(a)=>`Hi ${a.first}, here's that questionnaire I mentioned:\n${qLink(a.id)}\n\nFill it out whenever suits — the more detail the better, especially your running history and any niggles or injuries. Once it's in, I'll get us a call booked in.` },
  { key:"bookCall", label:"Book discovery call", stage:2,
    text:(a)=>`Thanks for filling that out, ${a.first} — really useful stuff. Let's get a call in the diary so we can talk through your goal race and how coaching would work day to day. What does your week look like?` },
  { key:"postCallWelcome", label:"Welcome after discovery call", stage:4,
    text:(a)=>`Great chatting today, ${a.first}! Excited to get started. I'm putting your first block together now and'll send it over in the next couple of days along with your pace zones and how we'll keep in touch each week.` },
  { key:"weeklyCheckin", label:"Weekly check-in prompt", stage:6,
    text:(a)=>`Hey ${a.first} — how did this week's training go? Let me know how the sessions felt (especially the harder ones), any niggles, sleep/energy, and anything life-wise that affected training. I'll use it to shape next week.` },
  { key:"monthlyReview", label:"Monthly review prompt", stage:6,
    text:(a)=>`Hi ${a.first}, we're a month into this block — wanted to check in on the bigger picture. How do you feel your fitness is tracking versus your goal? Anything you want more or less of in the next block?` },
  { key:"raceWeek", label:"Race week send-off", stage:7,
    text:(a)=>`Race week, ${a.first}! 🎉 Trust the training — you've put the work in. Keep this week easy, sleep well, and stick to food/kit you already know. Let's talk through final logistics: what time's the gun go off and what's the morning plan?` },
  { key:"debriefRequest", label:"Post-race debrief & testimonial ask", stage:8,
    text:(a)=>`Huge congrats on race day, ${a.first}! However it went, I'd love to hear all about it — splits, how it felt, what you'd do differently next time. And if you're happy to, a few lines on your experience coaching together would mean a lot for a testimonial.` }
];

/* ============================================================
   QUESTIONNAIRE (placeholder — rebuild your exact Google Form here)
   ============================================================ */
const QUESTIONNAIRE_SECTIONS = [
  { id:"personal", title:"Personal Details", fields:[
    { id:"fullName", label:"Full name", type:"text", required:true },
    { id:"email", label:"Email", type:"email", required:true },
    { id:"phone", label:"Phone number", type:"tel", required:true },
    { id:"dob", label:"Date of birth", type:"date" },
    { id:"location", label:"City / timezone", type:"text" }
  ]},
  { id:"history", title:"Running History", fields:[
    { id:"yearsRunning", label:"How many years have you been running?", type:"text" },
    { id:"weeklyMileage", label:"Current average weekly mileage / km", type:"text" },
    { id:"longestRecent", label:"Longest run in the last month", type:"text" },
    { id:"pbs", label:"Personal bests (5k / 10k / half / marathon — whatever applies)", type:"textarea" },
    { id:"currentPlan", label:"Are you currently following a training plan?", type:"text" },
    { id:"daysPerWeek", label:"How many days a week do you currently run?", type:"text" }
  ]},
  { id:"lifestyle", title:"Lifestyle", fields:[

/* ============================================================
   TINY IndexedDB LAYER
   ============================================================ */
const DB_NAME = "rc_pipeline_db";
const STORE = "athletes";
let _dbP = null;
function openDB(){
  if(_dbP) return _dbP;
  _dbP = new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = e=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        db.createObjectStore(STORE,{keyPath:"id"});
      }
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
  return _dbP;
}
async function dbGetAll(){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readonly");
    const r = tx.objectStore(STORE).getAll();
    r.onsuccess=()=>res(r.result.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)));
    r.onerror=()=>rej(r.error);
  });
}
async function dbGet(id){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readonly");
    const r = tx.objectStore(STORE).get(id);
    r.onsuccess=()=>res(r.result);
    r.onerror=()=>rej(r.error);
  });
}
async function dbPut(athlete){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).put(athlete);
    tx.oncomplete=()=>res(athlete);
    tx.onerror=()=>rej(tx.error);
  });
}
async function dbDelete(id){
  const db = await openDB();
  return new Promise((res,rej)=>{
    const tx = db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete=()=>res();
    tx.onerror=()=>rej(tx.error);
  });
}

/* ============================================================
   HELPERS
   ============================================================ */
function uid(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function firstName(name){ return (name||"there").trim().split(" ")[0]; }
function toast(msg){
  const t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),2400);
}
function simpleHash(str){
  let h=0; for(let i=0;i<str.length;i++){ h=(h<<5)-h+str.charCodeAt(i); h|=0; }
  return String(h);
}
function newAthlete(overrides){
  return Object.assign({
    id: uid(),
    createdAt: Date.now(),
    stage: 0,
    name: "", email: "", phone: "",
    inquiry: {},
    questionnaire: {},
    discoveryNotes: "",
    plan: { sessions: [], paceZones: {} },
    checkins: [],
    reviews: [],
    debrief: {}
  }, overrides||{});
}
function parseHash(){
  const raw = location.hash.replace(/^#/,"") || "/";
  const [path, qs] = raw.split("?");
  const params = {};
  if(qs){ qs.split("&").forEach(kv=>{ const [k,v]=kv.split("="); params[decodeURIComponent(k)]=decodeURIComponent(v||""); }); }
  return { path: path || "/", params };
}
async function submitToFormspree(payload){
  if(!CONFIG.FORMSPREE_ENDPOINT) return { ok:false, skipped:true };
  try{
    const res = await fetch(CONFIG.FORMSPREE_ENDPOINT,{
      method:"POST",
      headers:{ "Content-Type":"application/json", "Accept":"application/json" },
      body: JSON.stringify(payload)
    });
    return { ok: res.ok };
  }catch(e){
    return { ok:false, error:e };
  }
}
function waLink(number, text){
  if(!number) return null;
  return `https://wa.me/${number}?text=${encodeURIComponent(text)}`;
}

function stravaEnabled(){ return !!CONFIG.STRAVA_WORKER_URL; }
function stravaConnectUrl(athleteId){

  return `${CONFIG.STRAVA_WORKER_URL.replace(/\/$/,"")}/connect?athleteId=${encodeURIComponent(athleteId)}`;
}
async function fetchStravaStatus(athleteId){
  if(!stravaEnabled()) return { connected:false, disabled:true };
  try{
    const res = await fetch(`${CONFIG.STRAVA_WORKER_URL.replace(/\/$/,"")}/activities?athleteId=${encodeURIComponent(athleteId)}`);
    if(!res.ok) return { connected:false, error:true };

function paceLabel(minPerKm){
  if(!minPerKm) return "—";
  const m = Math.floor(minPerKm);
  const s = Math.round((minPerKm - m) * 60);
  return `${m}:${String(s).padStart(2,"0")}/km`;
}

/* ============================================================

   ============================================================ */
function fieldHtml(f, value){
  const val = value==null?"":value;
  const req = f.required ? "required" : "";
  if(f.type==="textarea"){
    return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label>
      <textarea name="${f.id}" ${req}>${esc(val)}</textarea></div>`;
  }
  if(f.type==="select"){
    const opts = (f.options||[]).map(o=>`<option value="${esc(o)}" ${val===o?"selected":""}>${esc(o)}</option>`).join("");
    return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label>
      <select name="${f.id}" ${req}><option value="">Select…</option>${opts}</select></div>`;
  }
  return `<div class="field"><label>${esc(f.label)}${f.required?' *':''}</label>
    <input type="${f.type}" name="${f.id}" value="${esc(val)}" ${req}></div>`;
}
function readForm(formEl, fields){
  const data = {};
  fields.forEach(f=>{ data[f.id] = formEl.elements[f.id] ? formEl.elements[f.id].value.trim() : ""; });
  return data;
}

const PIN_KEY = "rc_pin_hash";
function hasPin(){ return !!localStorage.getItem(PIN_KEY); }

function renderPinScreen(onSuccess){
  const creating = !hasPin();
  root.innerHTML = `

      <div class="pin-box">
        <h2>${creating ? "Set a PIN" : "Enter PIN"}</h2>
        <p class="muted">${creating
          ? "This is a simple local lock to deter casual shoulder-surfing — not real security."
          : "This device's dashboard is locked."}</p>

        ${creating ? `<p class="muted" style="margin-top:14px;">Confirm:</p><input type="password" id="pinConfirm" inputmode="numeric" maxlength="6" style="text-align:center;letter-spacing:6px;font-size:1.3rem;max-width:220px;margin:0 auto;display:block;">` : ""}
        <button class="btn btn-primary" style="margin-top:20px;" id="pinSubmit">${creating ? "Set PIN" : "Unlock"}</button>
        <p style="margin-top:18px;"><a href="#/">← Back to site</a></p>
      </div>
    </div>
  `;
  document.getElementById("pinSubmit").addEventListener("click", ()=>{
    const pin = document.getElementById("pinInput").value.trim();
    if(pin.length < 4){ toast("PIN should be at least 4 digits"); return; }
    if(creating){
      const confirm = document.getElementById("pinConfirm").value.trim();
      if(pin !== confirm){ toast("PINs don't match"); return; }
      setPin(pin); toast("PIN set"); onSuccess();
    } else {
      if(checkPin(pin)){ onSuccess(); } else { toast("Incorrect PIN"); }
    }
  });
}

    if(_activeTab !== "checkins" && params.strava === "connected") _activeTab = "overview";
    // strip the query string so refreshing doesn't re-show the toast
    history.replaceState(null, "", location.pathname + location.search + `#/dashboard/athlete/${athlete.id}`);
  }
  const tabs = [
    ["overview","Overview"],
    ["questionnaire","Questionnaire"],
    ["discovery","Discovery Call"],
    ["plan","Plan Builder"],
    ["checkins","Weekly Check-ins"],
    ["reviews","Monthly Reviews"],
    ["debrief","Race Debrief"],
    ["templates","Templates"]
  ];
  root.innerHTML = `
    <div class="dash-shell">
      <div class="dash-top">
        <a class="btn btn-ghost" href="#/dashboard">← All athletes</a>
        <div>
          <a class="btn btn-ghost" href="#/settings">Settings</a>
        </div>
      </div>
      <div class="dash-body">
        <div class="profile-head">
          <div>
            <h2 style="margin-bottom:4px;">${esc(athlete.name||"Unnamed athlete")}</h2>
            <p class="muted" style="margin:0;">${esc(athlete.email||"")} ${athlete.phone?" · "+esc(athlete.phone):""}</p>
          </div>
          <div>
            <label class="muted" style="font-size:.78rem;display:block;margin-bottom:4px;">Stage</label>
            <select class="stage-select" id="stageSelect">
              ${CONFIG.STAGES.map((s,i)=>`<option value="${i}" ${athlete.stage===i?"selected":""}>${i+1}. ${esc(s)}</option>`).join("")}
            </select>
          </div>
        </div>
        <div class="tabs">
          ${tabs.map(([k,label])=>`<button class="tab-btn ${_activeTab===k?'active':''}" data-tab="${k}">${label}</button>`).join("")}
        </div>
        <div id="tabContent"></div>
        <div class="row-actions">
          <button class="btn btn-danger btn-sm" id="deleteAthlete">Delete athlete</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById("stageSelect").addEventListener("change", async e=>{
    athlete.stage = parseInt(e.target.value,10);
    await dbPut(athlete);
    toast("Stage updated");
  });
  document.getElementById("deleteAthlete").addEventListener("click", async ()=>{
    if(confirm(`Delete ${athlete.name}? This can't be undone.`)){
      await dbDelete(athlete.id);
      toast("Athlete deleted");
      location.hash = "#/dashboard";
    }
  });
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{ _activeTab = btn.dataset.tab; renderTab(athlete); });
  });
  renderTab(athlete);
}

function renderTab(athlete){
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active", b.dataset.tab===_activeTab));
  const el = document.getElementById("tabContent");
  const renderers = {
    overview: tabOverview, questionnaire: tabQuestionnaire, discovery: tabDiscovery,
    plan: tabPlan, checkins: tabCheckins, reviews: tabReviews, debrief: tabDebrief, templates: tabTemplates
  };
  el.innerHTML = renderers[_activeTab](athlete);
  wireTab(_activeTab, athlete);
}

function tabOverview(a){
  return `
    <div class="grid2">
      <div class="card">
        <h3>Inquiry</h3>
        ${Object.keys(a.inquiry||{}).length ? `
          <table class="simple">
            ${INQUIRY_FIELDS.map(f=>`<tr><th>${esc(f.label)}</th><td>${esc(a.inquiry[f.id]||"—")}</td></tr>`).join("")}
          </table>` : `<p class="muted">No inquiry data (added manually).</p>`}
      </div>
      <div class="card">
        <h3>Quick edit</h3>
        <div class="field"><label>Name</label><input type="text" id="ovName" value="${esc(a.name)}"></div>
        <div class="field"><label>Email</label><input type="email" id="ovEmail" value="${esc(a.email)}"></div>
        <div class="field"><label>Phone</label><input type="tel" id="ovPhone" value="${esc(a.phone)}"></div>
        <button class="btn btn-secondary btn-sm" id="ovSave">Save</button>
      </div>
    </div>
    <div class="card" style="margin-top:16px;">
      <h3>Strava</h3>
      <div id="stravaOverviewBox"><p class="muted">Checking connection…</p></div>
    </div>
  `;
}
function tabQuestionnaire(a){
  const q = a.questionnaire||{};
  if(!Object.keys(q).length){
    return `<div class="card">
      <p class="muted">No questionnaire response yet.</p>
      <p>Send them the link, or fill it out together on a call:</p>
      <div class="template-box">${esc(qLink(a.id))}</div>
      <div class="template-actions">
        <button class="btn btn-secondary btn-sm copyBtn" data-text="${esc(qLink(a.id))}">Copy link</button>
        <a class="btn btn-primary btn-sm" href="#/questionnaire?athlete=${a.id}">Open questionnaire</a>
      </div>
    </div>`;
  }
  return QUESTIONNAIRE_SECTIONS.map(sec=>`
    <div class="card" style="margin-bottom:16px;">
      <h3>${esc(sec.title)}</h3>
      <table class="simple">
        ${sec.fields.map(f=>`<tr><th style="width:40%;">${esc(f.label)}</th><td>${esc(q[f.id]||"—")}</td></tr>`).join("")}
      </table>
    </div>
  `).join("");
}
function tabDiscovery(a){
  return `
    <div class="card">
      <h3>Discovery call notes</h3>
      <div class="field"><textarea id="discoveryNotes" rows="10">${esc(a.discoveryNotes||"")}</textarea></div>
      <button class="btn btn-secondary btn-sm" id="saveDiscovery">Save notes</button>
    </div>
  `;
}
function tabPlan(a){
  const sessions = a.plan?.sessions||[];
  const zones = a.plan?.paceZones||{};
  const zoneKeys = ["Easy","Marathon","Threshold","Interval","Recovery"];
  return `
    <div class="card" style="margin-bottom:16px;">
      <h3>Pace zones</h3>
      <div class="grid2">
        ${zoneKeys.map(z=>`<div class="field"><label>${z} pace</label><input type="text" data-zone="${z}" value="${esc(zones[z]||"")}" placeholder="e.g. 5:30/km"></div>`).join("")}
      </div>
      <button class="btn btn-secondary btn-sm" id="saveZones">Save pace zones</button>
    </div>
    <div class="card">
      <h3>Weekly sessions</h3>
      ${sessions.length ? sessions.map((s,i)=>`
        <div class="list-item">
          <div class="meta">${esc(s.day||"")}</div>
          <strong>${esc(s.type||"")}</strong> — ${esc(s.description||"")}
          <div class="row-actions"><button class="btn btn-ghost btn-sm removeSession" data-i="${i}">Remove</button></div>
        </div>
      `).join("") : `<p class="muted">No sessions added yet.</p>`}
      <fieldset style="margin-top:14px;">
        <legend>Add session</legend>
        <div class="grid2">
          <div class="field"><label>Day</label><input type="text" id="sesDay" placeholder="Tuesday"></div>
          <div class="field"><label>Type</label><input type="text" id="sesType" placeholder="Intervals"></div>
        </div>
        <div class="field"><label>Description</label><textarea id="sesDesc" placeholder="6 x 800m @ threshold, 400m jog recovery"></textarea></div>
        <button class="btn btn-primary btn-sm" id="addSession">Add session</button>
      </fieldset>
    </div>
  `;
}
function tabCheckins(a){
  const items = a.checkins||[];
  return `
    <div class="card" style="margin-bottom:16px;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h3 style="margin:0;">Recent Strava activity</h3>
        <button class="btn btn-ghost btn-sm" id="stravaRefreshBtn">↻ Refresh</button>
      </div>
      <div id="stravaCheckinBox" style="margin-top:10px;"><p class="muted">Checking connection…</p></div>
    </div>
    <div class="card">
      <h3>Weekly check-ins</h3>
      ${items.length ? items.slice().reverse().map((c)=>`
        <div class="list-item"><div class="meta">${esc(c.date)}</div>${esc(c.notes).replace(/\n/g,"<br>")}</div>
      `).join("") : `<p class="muted">No check-ins logged yet.</p>`}
      <fieldset style="margin-top:14px;">
        <legend>Log check-in</legend>
        <div class="field"><label>Date</label><input type="date" id="ciDate" value="${new Date().toISOString().slice(0,10)}"></div>
        <div class="field"><label>Notes</label><textarea id="ciNotes" placeholder="Sessions completed, RPE, sleep, niggles..."></textarea></div>
        <button class="btn btn-primary btn-sm" id="addCheckin">Add check-in</button>
      </fieldset>
    </div>
  `;
}
function tabReviews(a){
  const items = a.reviews||[];
  return `
    <div class="card">
      <h3>Monthly reviews</h3>
      ${items.length ? items.slice().reverse().map((r)=>`
        <div class="list-item"><div class="meta">${esc(r.month)}</div>${esc(r.notes).replace(/\n/g,"<br>")}</div>
      `).join("") : `<p class="muted">No reviews logged yet.</p>`}
      <fieldset style="margin-top:14px;">
        <legend>Log review</legend>
        <div class="field"><label>Month</label><input type="text" id="rvMonth" placeholder="July 2026"></div>
        <div class="field"><label>Notes</label><textarea id="rvNotes" placeholder="Progress vs goal, updated pace zones, next focus..."></textarea></div>
        <button class="btn btn-primary btn-sm" id="addReview">Add review</button>
      </fieldset>
    </div>
  `;
}
function tabDebrief(a){
  const d = a.debrief||{};
  return `
    <div class="card">
      <h3>Race debrief</h3>
      <div class="grid2">
        <div class="field"><label>Race name</label><input type="text" id="dbRace" value="${esc(d.raceName||"")}"></div>
        <div class="field"><label>Date</label><input type="date" id="dbDate" value="${esc(d.date||"")}"></div>
        <div class="field"><label>Result / time</label><input type="text" id="dbResult" value="${esc(d.result||"")}"></div>
      </div>
      <div class="field"><label>What went well / to improve</label><textarea id="dbNotes" rows="4">${esc(d.notes||"")}</textarea></div>
      <div class="field"><label>Testimonial</label><textarea id="dbTestimonial" rows="4">${esc(d.testimonial||"")}</textarea></div>
      <button class="btn btn-secondary btn-sm" id="saveDebrief">Save debrief</button>
    </div>
  `;
}
function tabTemplates(a){
  const first = firstName(a.name);
  const withFirst = { ...a, first };
  return `
    <p class="muted">Placeholder scripts — replace the TEMPLATES object in the file with your real wording once you share it.</p>
    ${TEMPLATES.map(t=>{
      const text = t.text(withFirst);
      const wa = waLink(CONFIG.WHATSAPP_NUMBER, text);
      return `
        <div class="card" style="margin-bottom:14px;">
          <h4 style="margin-bottom:8px;">${esc(t.label)}</h4>
          <div class="template-box">${esc(text)}</div>
          <div class="template-actions">
            <button class="btn btn-secondary btn-sm copyBtn" data-text="${esc(text)}">Copy</button>
            ${wa ? `<a class="btn btn-moss btn-sm" href="${wa}" target="_blank" rel="noopener">Open in WhatsApp</a>` : ""}
            ${t.key==="sendQuestionnaire" ? `<button class="btn btn-ghost btn-sm copyBtn" data-text="${esc(qLink(a.id))}">Copy questionnaire link</button>` : ""}
          </div>
        </div>
      `;
    }).join("")}
  `;
}

async function renderStravaOverviewBox(a){
  const box = document.getElementById("stravaOverviewBox");
  if(!box) return;
  if(!stravaEnabled()){
    box.innerHTML = `<p class="muted">Not set up yet — deploy the Worker in <code>strava-worker/</code> and paste its URL into <code>CONFIG.STRAVA_WORKER_URL</code>.</p>`;
    return;
  }
  const status = await fetchStravaStatus(a.id);
  if(status.error){
    box.innerHTML = `<p class="muted">Couldn't reach the Strava Worker — check the URL in CONFIG and that it's deployed.</p>`;
    return;
  }
  if(status.connected){
    box.innerHTML = `
      <p>Connected as <strong>${esc(status.athleteName||"Strava athlete")}</strong>.</p>
      <button class="btn btn-secondary btn-sm" id="stravaDisconnectBtn">Disconnect</button>`;
    document.getElementById("stravaDisconnectBtn").addEventListener("click", async ()=>{
      await disconnectStrava(a.id); toast("Strava disconnected"); renderStravaOverviewBox(a);
    });
  } else {
    box.innerHTML = `
      <p class="muted">Not connected yet. Send the athlete this link, or connect on their behalf.</p>
      <a class="btn btn-moss btn-sm" href="${esc(stravaConnectUrl(a.id))}">Connect Strava</a>`;
  }
}

async function renderStravaCheckinBox(a){
  const box = document.getElementById("stravaCheckinBox");
  if(!box) return;
  box.innerHTML = `<p class="muted">Checking connection…</p>`;
  if(!stravaEnabled()){
    box.innerHTML = `<p class="muted">Not set up yet — see the Strava setup guide in <code>strava-worker/SETUP.md</code>.</p>`;
    return;
  }
  const status = await fetchStravaStatus(a.id);
  if(status.error){
    box.innerHTML = `<p class="muted">Couldn't reach the Strava Worker right now.</p>`;
    return;
  }
  if(!status.connected){
    box.innerHTML = `<p class="muted">Athlete hasn't connected Strava yet — see the Overview tab to send them a connect link.</p>`;
    return;
  }
  const activities = status.activities||[];
  if(!activities.length){
    box.innerHTML = `<p class="muted">Connected, but no recent runs found yet.</p>`;
    return;
  }
  box.innerHTML = `
    <table class="simple">
      <tr><th>Date</th><th>Activity</th><th>Distance</th><th>Time</th><th>Pace</th></tr>
      ${activities.map(act=>`
        <tr>
          <td>${esc(new Date(act.date).toLocaleDateString())}</td>
          <td>${esc(act.name)}</td>
          <td>${act.distanceKm} km</td>
          <td>${act.movingTimeMin} min</td>
          <td>${paceLabel(act.avgPaceMinPerKm)}</td>
        </tr>
      `).join("")}
    </table>
  `;
}

function wireTab(tab, a){
  document.querySelectorAll(".copyBtn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      navigator.clipboard.writeText(btn.dataset.text).then(()=>toast("Copied"));
    });
  });
  if(tab==="overview"){
    document.getElementById("ovSave").addEventListener("click", async ()=>{
      a.name = document.getElementById("ovName").value.trim();
      a.email = document.getElementById("ovEmail").value.trim();
      a.phone = document.getElementById("ovPhone").value.trim();
      await dbPut(a); toast("Saved"); renderAthleteProfile(a);
    });
    renderStravaOverviewBox(a);
  }
  if(tab==="discovery"){
    document.getElementById("saveDiscovery").addEventListener("click", async ()=>{
      a.discoveryNotes = document.getElementById("discoveryNotes").value;
      await dbPut(a); toast("Notes saved");
    });
  }
  if(tab==="plan"){
    document.getElementById("saveZones").addEventListener("click", async ()=>{
      const zones = {};
      document.querySelectorAll("[data-zone]").forEach(inp=>{ zones[inp.dataset.zone] = inp.value.trim(); });
      a.plan = a.plan || {sessions:[],paceZones:{}};
      a.plan.paceZones = zones;
      await dbPut(a); toast("Pace zones saved");
    });
    document.getElementById("addSession").addEventListener("click", async ()=>{
      const day = document.getElementById("sesDay").value.trim();
      const type = document.getElementById("sesType").value.trim();
      const description = document.getElementById("sesDesc").value.trim();
      if(!type){ toast("Session type required"); return; }
      a.plan = a.plan || {sessions:[],paceZones:{}};
      a.plan.sessions.push({day,type,description});
      await dbPut(a); toast("Session added"); renderTab(a);
    });
    document.querySelectorAll(".removeSession").forEach(btn=>{
      btn.addEventListener("click", async ()=>{
        a.plan.sessions.splice(parseInt(btn.dataset.i,10),1);
        await dbPut(a); renderTab(a);
      });
    });
  }
  if(tab==="checkins"){
    document.getElementById("addCheckin").addEventListener("click", async ()=>{
      const date = document.getElementById("ciDate").value;
      const notes = document.getElementById("ciNotes").value.trim();
      if(!notes){ toast("Add some notes first"); return; }
      a.checkins = a.checkins||[];
      a.checkins.push({date,notes});
      await dbPut(a); toast("Check-in logged"); renderTab(a);
    });
    document.getElementById("stravaRefreshBtn").addEventListener("click", ()=>renderStravaCheckinBox(a));
    renderStravaCheckinBox(a);
  }
  if(tab==="reviews"){
    document.getElementById("addReview").addEventListener("click", async ()=>{
      const month = document.getElementById("rvMonth").value.trim();
      const notes = document.getElementById("rvNotes").value.trim();
      if(!month || !notes){ toast("Fill in month and notes"); return; }
      a.reviews = a.reviews||[];
      a.reviews.push({month,notes});
      await dbPut(a); toast("Review logged"); renderTab(a);
    });
  }
  if(tab==="debrief"){
    document.getElementById("saveDebrief").addEventListener("click", async ()=>{
      a.debrief = {
        raceName: document.getElementById("dbRace").value.trim(),
        date: document.getElementById("dbDate").value,
        result: document.getElementById("dbResult").value.trim(),
        notes: document.getElementById("dbNotes").value.trim(),
        testimonial: document.getElementById("dbTestimonial").value.trim()
      };
      await dbPut(a); toast("Debrief saved");
    });
  }
}

/* ============================================================
   SETTINGS
   ============================================================ */
function renderSettings(){
  root.innerHTML = `
    <div class="dash-shell">
      <div class="dash-top">
        <a class="btn btn-ghost" href="#/dashboard">← Dashboard</a>
        <span class="brand">Settings</span>
      </div>
      <div class="dash-body">
        <div class="container" style="padding:0;max-width:640px;margin:0;">
          <div class="card" style="margin-bottom:18px;">
            <h3>Business config (reference)</h3>
            <p class="muted">Edit the CONFIG object at the top of index.html to change these.</p>
            <table class="simple">
              <tr><th>Business name</th><td>${esc(CONFIG.BUSINESS_NAME)}</td></tr>
              <tr><th>Coach name</th><td>${esc(CONFIG.COACH_NAME)}</td></tr>
              <tr><th>Contact email</th><td>${esc(CONFIG.CONTACT_EMAIL)}</td></tr>
              <tr><th>WhatsApp number</th><td>${esc(CONFIG.WHATSAPP_NUMBER||"— not set —")}</td></tr>
              <tr><th>Formspree endpoint</th><td>${esc(CONFIG.FORMSPREE_ENDPOINT||"— not set —")}</td></tr>
            </table>
          </div>
          <div class="card" style="margin-bottom:18px;">
            <h3>Reset PIN</h3>
            <div class="field"><label>Current PIN</label><input type="password" id="curPin" maxlength="6"></div>
            <div class="field"><label>New PIN</label><input type="password" id="newPin" maxlength="6"></div>
            <div class="field"><label>Confirm new PIN</label><input type="password" id="confPin" maxlength="6"></div>
            <button class="btn btn-secondary btn-sm" id="resetPinBtn">Update PIN</button>
          </div>
          <div class="card">
            <h3>Backup</h3>
            <p class="muted">Export regularly — this is the only backup of your athlete data.</p>
            <div class="row-actions">
              <button class="btn btn-primary btn-sm" id="exportBtn">Export JSON</button>
              <label class="btn btn-secondary btn-sm" for="importFile" style="cursor:pointer;">Import JSON</label>
              <input type="file" id="importFile" accept="application/json" style="display:none;">
            </div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.getElementById("resetPinBtn").addEventListener("click", ()=>{
    const cur = document.getElementById("curPin").value.trim();
    const next = document.getElementById("newPin").value.trim();
    const conf = document.getElementById("confPin").value.trim();
    if(!checkPin(cur)){ toast("Current PIN is incorrect"); return; }
    if(next.length<4){ toast("New PIN should be at least 4 digits"); return; }
    if(next!==conf){ toast("New PINs don't match"); return; }
    setPin(next); toast("PIN updated");
  });
  document.getElementById("exportBtn").addEventListener("click", async ()=>{
    const athletes = await dbGetAll();
    const blob = new Blob([JSON.stringify({ exportedAt:new Date().toISOString(), athletes },null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `running-coach-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(url);
  });
  document.getElementById("importFile").addEventListener("change", async e=>{
    const file = e.target.files[0];
    if(!file) return;
    try{
      const text = await file.text();
      const data = JSON.parse(text);
      const athletes = data.athletes || data;
      if(!Array.isArray(athletes)) throw new Error("bad format");
      for(const a of athletes){ await dbPut(a); }
      toast(`Imported ${athletes.length} athlete(s)`);
    }catch(err){
      toast("Import failed — invalid file");
    }
  });
}
</script>
