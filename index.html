function openResourceModal(){
  const wrap = document.createElement("div");
  wrap.className = "modal-backdrop";
  wrap.innerHTML = `
    <div class="modal-box">
      <h3>Add resource</h3>
      <div class="field"><label>Category</label>
        <select id="rsCategory">
          <option>Warm-up routine</option>
          <option>Strength session</option>
          <option>Pace guide</option>
          <option>Race preparation</option>
          <option>Recovery tips</option>
          <option>Other</option>
        </select>
      </div>
      <div class="field"><label>Title *</label><input type="text" id="rsTitle"></div>
      <div class="field"><label>Content</label><textarea id="rsBody" rows="6"></textarea></div>
      <div class="field"><label>Link (optional)</label><input type="text" id="rsLink" placeholder="https://..."></div>
      <div class="row-actions">
        <button class="btn btn-primary" id="rsSave">Save</button>
        <button class="btn btn-secondary" id="rsCancel">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  wrap.querySelector("#rsCancel").addEventListener("click", ()=>wrap.remove());
  wrap.querySelector("#rsSave").addEventListener("click", async ()=>{
    const title = document.getElementById("rsTitle").value.trim();
    if(!title){ toast("Title required"); return; }
    try{
      await addResource({
        category: document.getElementById("rsCategory").value,
        title,
        body: document.getElementById("rsBody").value.trim(),
        link: document.getElementById("rsLink").value.trim()
      });
      wrap.remove();
      renderResources();
    }catch(e){
      toast(e.message || "Couldn't save resource");
    }
  });
}

/* ============================================================
   ATHLETE DASHBOARD (real athlete-facing view)
   Real per-athlete accounts, backed by the same Postgres database
   as everything else (see server/). The coach can also open this
   same view read-write via "View as Athlete" — see the `preview`
   flag in renderAthleteView, which just swaps the header/logout
   button; the rendered content is identical either way.
   ============================================================ */
const AV_RENDERERS = { dashboard: avDashboard, training: avTraining, progress: avProgress, messages: avMessages, resources: avResources, profile: avProfile };
function renderAthleteTabContent(a, tab){
  const content = document.getElementById("athleteTabContent");
  if(!content) return;
  content.innerHTML = AV_RENDERERS[tab](a);
  wireAthleteView(tab, a);
}
async function renderAthleteView(athleteId, tab){
  const athlete = await dbGet(athleteId);
  if(!athlete){
    root.innerHTML = `<div class="container" style="padding:60px 0"><h2>Athlete not found</h2><a href="#/dashboard">Back to dashboard</a></div>`;
    return;
  }
  tab = tab || "dashboard";
  // Fresh navigation into the athlete view (including switching bottom-nav
  // tabs, which are real links) always resets to the coach's actual
  // current week — any in-tab browsing from a previous visit doesn't stick.
  _avWeekIndex = null;
  const preview = isCoach();
  root.innerHTML = `
    <div class="dash-shell athlete-view">
      <div class="dash-top">
        ${preview
          ? `<a class="btn btn-ghost" href="#/dashboard/athlete/${athlete.id}">← Coach view</a><span class="tag">Preview — what ${esc(firstName(athlete.name))} would see</span><button class="theme-toggle-btn" onclick="cycleTheme()" aria-label="Toggle color theme">${themeToggleLabel()}</button>`
          : `<span class="brand">${esc(CONFIG.BUSINESS_NAME)}</span><a class="btn btn-ghost btn-sm" href="#/">View site</a><button class="theme-toggle-btn" onclick="cycleTheme()" aria-label="Toggle color theme">${themeToggleLabel()}</button><button class="btn btn-ghost btn-sm" id="athleteLogoutBtn">Log out</button>`
        }
      </div>
      <div class="dash-body athlete-view-body">
        <div id="athleteTabContent"></div>
      </div>
      <div class="bottom-nav">
        ${["dashboard","training","progress","messages","resources","profile"].map(t=>`
          <a class="bottom-nav-item ${tab===t?'active':''}" href="#/athlete-view/${athlete.id}/${t}">${t.charAt(0).toUpperCase()+t.slice(1)}</a>
        `).join("")}
      </div>
    </div>
  `;
  if(!preview){
    document.getElementById("athleteLogoutBtn").addEventListener("click", ()=>{
      clearSession();
      location.hash = "#/login";
    });
  }
  // Payment gate: a real athlete (not the coach previewing) whose payment
  // status isn't active/comp gets a locked screen instead of any tab —
  // the coach can still preview the real dashboard regardless.
  const isPaid = athlete.paymentStatus==="active" || athlete.paymentStatus==="comp";
  if(!preview && !isPaid){
    const content = document.getElementById("athleteTabContent");
    content.innerHTML = renderPaymentGate(athlete);
    wirePaymentGate(athlete);
    return;
  }
  renderAthleteTabContent(athlete, tab);
}

function renderPaymentGate(a){
  return `
    <div class="card" style="max-width:480px;margin:20px auto;text-align:center;">
      <h2 style="margin-bottom:6px;">Almost there, ${esc(firstName(a.name))}!</h2>
      <p class="muted">Your dashboard, training plan, and resources unlock once your coaching payment is set up. Reach out to ${esc(CONFIG.COACH_FIRST)} to sort payment, or enter an access code below if you have one.</p>
      ${(CONFIG.PLANS||[]).length ? `
        <div style="text-align:left;margin:18px 0;">
          <h3 style="font-size:1rem;">Available plans</h3>
          ${CONFIG.PLANS.map(p=>`
            <div class="list-item" style="margin-bottom:8px;">
              <strong>${esc(p.name)}</strong> — ${esc(p.price)}
              ${p.description?`<div class="muted">${esc(p.description)}</div>`:""}
            </div>
          `).join("")}
        </div>
      ` : ""}
      <a class="btn btn-primary btn-block" href="mailto:${esc(CONFIG.CONTACT_EMAIL)}" style="margin-bottom:14px;">Email ${esc(CONFIG.COACH_FIRST)} about payment</a>
      <div class="field" style="text-align:left;"><label>Have an access code?</label><input type="text" id="pgCode" placeholder="Enter code"></div>
      <button class="btn btn-secondary btn-block" id="pgRedeem">Unlock with code</button>
    </div>
  `;
}
function wirePaymentGate(a){
  document.getElementById("pgRedeem").addEventListener("click", async ()=>{
    const code = document.getElementById("pgCode").value.trim();
    if(!code){ toast("Enter a code"); return; }
    try{
      await apiFetch(`/api/athletes/${a.id}/redeem-code`, { method:"POST", body: JSON.stringify({ code }) });
      toast("Unlocked! Welcome aboard 🎉");
      await renderAthleteView(a.id, "dashboard");
    }catch(e){
      toast(e.message || "That code didn't work");
    }
  });
}

function avDashboard(a){
  const week = getCurrentWeek(a);
  const progress = weekProgress(week);
  const daysLeft = daysUntil(a.goalRaceDate);
  const streak = computeStreak(a);
  const month = computeMonthStats(a);
  const achievements = computeAchievements(a);
  const nextSession = week ? (week.sessions||[]).find(s=>!s.completed) : null;
  const nextSessionDate = week && nextSession ? sessionDateISO(week, nextSession) : null;
  const todayISO = toLocalISODate(new Date());
  const isNextSessionToday = nextSessionDate === todayISO;
  const weekStartsInFuture = week && week.startDate ? week.startDate > todayISO : false;
  const lastMsg = (a.messages||[])[a.messages.length-1];

  let racePrepPct = null;
  if(a.startDate && a.goalRaceDate){
    const start = new Date(a.startDate+"T00:00:00").getTime();
    const end = new Date(a.goalRaceDate+"T00:00:00").getTime();
    const now = Date.now();
    if(end>start) racePrepPct = Math.min(100,Math.max(0,Math.round(((now-start)/(end-start))*100)));
  }

  return `
    <div class="card av-welcome">
      <div class="av-greeting">Good day, ${esc(firstName(a.name))} 👋</div>
      ${a.goalRace? `<div class="av-goal">Goal: ${esc(a.goalRace)}</div>`:""}
      ${a.goalRaceDate? `<div class="muted">Race Day: ${fmtDate(a.goalRaceDate)}${daysLeft!=null?` · ${daysLeft>=0?daysLeft+" days remaining":"race day has passed"}`:""}</div>`:""}
      ${racePrepPct!=null ? `
        <div class="progress-bar-outer" style="margin-top:12px;"><div class="progress-bar-inner" style="width:${racePrepPct}%;"></div></div>
        <div class="muted" style="font-size:.78rem;">Race Preparation: ${racePrepPct}%</div>
      ` : ""}
    </div>

    ${a.welcomeMessage ? `
    <div class="card">
      <h3>A note from ${esc(CONFIG.COACH_FIRST)}</h3>
      <p style="margin:0;white-space:pre-wrap;">${esc(a.welcomeMessage)}</p>
    </div>` : ""}

    ${(a.goalA || a.goalB || a.goalC || (a.currentFocusAreas||[]).length || a.recentRacePerformance || a.currentWeeklyVolume) ? `
    <div class="card">
      <h3>Your goals for this block</h3>
      ${a.recentRacePerformance ? `<div class="muted" style="margin-bottom:2px;"><strong>Recent race:</strong> ${esc(a.recentRacePerformance)}</div>` : ""}
      ${a.currentWeeklyVolume ? `<div class="muted" style="margin-bottom:10px;"><strong>Starting volume:</strong> ${esc(a.currentWeeklyVolume)}</div>` : ""}
      ${(a.currentFocusAreas||[]).length ? `
        <div style="margin-bottom:10px;">
          <strong style="font-size:.88rem;">Focus areas</strong>
          <ul style="margin:4px 0 0;padding-left:20px;">
            ${(a.currentFocusAreas||[]).map(f=>`<li style="font-size:.9rem;">${esc(f)}</li>`).join("")}
          </ul>
        </div>` : ""}
      ${a.goalA ? `<div style="font-size:.9rem;margin-bottom:2px;"><strong>A Goal:</strong> ${esc(a.goalA)}</div>` : ""}
      ${a.goalB ? `<div style="font-size:.9rem;margin-bottom:2px;"><strong>B Goal:</strong> ${esc(a.goalB)}</div>` : ""}
      ${a.goalC ? `<div style="font-size:.9rem;"><strong>C Goal:</strong> ${esc(a.goalC)}</div>` : ""}
    </div>` : ""}

    ${normalizePaceZones(a).some(z=>z.pace) ? `
    <div class="card">
      <h3>Pace guide</h3>
      <table class="simple">
        ${normalizePaceZones(a).filter(z=>z.pace).map(z=>`<tr><th>${esc(z.label)}</th><td>${esc(z.pace)}</td></tr>`).join("")}
      </table>
    </div>` : ""}

    <div class="card av-next-workout">
      <h3 style="margin-bottom:4px;">${isNextSessionToday ? "Today's Session" : "Next Session"}</h3>
      ${nextSession ? `
        <div class="av-session-title">${esc(nextSession.type)}</div>
        <div class="muted">${nextSessionDate ? fmtDate(nextSessionDate)+" · " : ""}${nextSession.distance?esc(nextSession.distance)+"km":""}${nextSession.pace?" · "+esc(nextSession.pace):""}</div>
        <button class="btn btn-primary btn-sm" style="margin-top:10px;" id="viewNextWorkoutBtn">View Workout</button>
      ` : `<p class="muted">${week ? "All sessions complete for this week 🎉" : "No plan set up yet — check back once your coach has built your training block."}</p>`}
    </div>

    <div class="card">
      <h3>${weekStartsInFuture ? "Upcoming Week" : "This Week"}</h3>
      ${week ? `
        ${weekStartsInFuture ? `<div class="muted" style="margin-bottom:6px;">Starts ${fmtDate(week.startDate)}</div>` : ""}
        <div class="muted">Sessions Completed: ${progress.completed}/${progress.total}</div>
        <div class="muted">Distance: ${progress.distanceCompleted}km / ${progress.distanceTotal}km</div>
        <div class="muted">Long Run: ${progress.longRunDone? "Completed ✅" : "Not yet"}</div>
        <div class="progress-bar-outer" style="margin-top:10px;"><div class="progress-bar-inner" style="width:${progress.pct}%;"></div></div>
      ` : `<p class="muted">No sessions this week yet.</p>`}
    </div>

    ${week && (week.sessions||[]).length ? `
    <div class="card">
      <h3>Upcoming Schedule</h3>
      ${week.sessions.map(s=>`<div class="list-item" style="margin-bottom:8px;"><div class="meta">${esc(s.day||"—")} ${s.completed?"✅":""}</div>${esc(s.type)}${s.distance?" — "+esc(s.distance)+"km":""}</div>`).join("")}
    </div>` : ""}

    ${lastMsg ? `
    <div class="card">
      <h3>Coach Message</h3>
      <p style="margin:0;">${esc(lastMsg.text)}</p>
      <div class="meta" style="margin-top:6px;">${esc(lastMsg.date)}</div>
    </div>` : ""}

    <div class="overview-cards">
      <div class="ov-card"><div class="ov-num">${streak}</div><div class="ov-label">Training Streak</div></div>
      <div class="ov-card"><div class="ov-num">${month.distance}km</div><div class="ov-label">This Month</div></div>
      <div class="ov-card"><div class="ov-num">${month.sessions}</div><div class="ov-label">Sessions This Month</div></div>
      <div class="ov-card"><div class="ov-num">${daysLeft!=null?daysLeft:"—"}</div><div class="ov-label">Race Countdown</div></div>
    </div>

    ${achievements.length ? `
    <div class="card">
      <h3>Recent Achievements</h3>
      <div class="achievement-list">${achievements.map(x=>`<span class="achievement-chip">${esc(x)}</span>`).join("")}</div>
    </div>` : ""}
  `;
}

function avTraining(a){
  const weeks = getWeeks(a);
  const want = _avWeekIndex!=null ? _avWeekIndex : (a.currentWeekIndex||0);
  const idx = Math.min(Math.max(want,0), Math.max(weeks.length-1,0));
  const week = weeks[idx];
  const progress = weekProgress(week);
  const celebrate = week && progress.total>0 && progress.completed===progress.total;

  return `
    ${weeks.length ? `
    <div class="week-nav">
      <button class="btn btn-ghost btn-sm" id="avPrevWeek" ${idx<=0?"disabled":""}>← Prev</button>
      <select id="avWeekSelect">
        ${weeks.map((w,i)=>`<option value="${i}" ${i===idx?"selected":""}>Week ${esc(w.weekNumber)}</option>`).join("")}
      </select>
      <button class="btn btn-ghost btn-sm" id="avNextWeek" ${idx>=weeks.length-1?"disabled":""}>Next →</button>
    </div>
    <div class="toolbar">
      <button class="btn btn-secondary btn-sm" id="avAddWeekCal">📅 Add this week to calendar</button>
    </div>` : ""}
    ${!week ? `<p class="muted">No weeks in this plan yet — check back once your coach has built your training block.</p>` : `
      ${celebrate ? `
        <div class="card celebrate-card">
          <h3 style="margin-bottom:6px;">🎉 Week Complete!</h3>
          <p style="margin:0;">You completed:</p>
          <p style="margin:0;">${progress.completed}/${progress.total} sessions · ${progress.distanceCompleted}km total distance${progress.longRunDone?" · long run achieved":""}</p>
        </div>
      ` : ""}
      <div class="session-list">
        ${(week.sessions||[]).map((s,si)=>`
          <div class="session-row ${s.completed?'done':''}">
            <div class="session-row-head" data-toggle="${si}">
              <span class="session-check">${s.completed?"✅":"⭕"}</span>
              <span class="session-day">${esc(s.day||"—")}</span>
              <span class="session-type">${esc(s.type)}</span>
              <span class="muted">${s.distance?esc(s.distance)+"km":""}</span>
            </div>
            <div class="session-detail" id="sd-${si}" style="display:none;">
              ${s.warmup?`<p><strong>Warm-up:</strong> ${esc(s.warmup)}</p>`:""}
              ${s.main?`<p><strong>Main session:</strong> ${esc(s.main)}</p>`:""}
              ${s.cooldown?`<p><strong>Cool-down:</strong> ${esc(s.cooldown)}</p>`:""}
              ${s.coachNotes?`<p><strong>Coach notes:</strong> ${esc(s.coachNotes)}</p>`:""}
              ${!s.warmup && !s.main && !s.cooldown && !s.coachNotes && s.description ? `<p>${esc(s.description)}</p>`:""}
              ${s.completed ? `<p class="muted">Actual: ${esc(s.actual&&s.actual.distance||"—")}km, ${esc(s.actual&&s.actual.time||"—")}, RPE ${esc(s.actual&&s.actual.rpe||"—")}${s.actual&&s.actual.notes?` — "${esc(s.actual.notes)}"`:""}</p>` : `<button class="btn btn-primary btn-sm markCompleteBtn" data-si="${si}">Mark Complete</button>`}
              <button class="btn btn-ghost btn-sm avAddSessionCal" data-si="${si}" style="margin-left:6px;">📅 Add to calendar</button>
            </div>
          </div>
        `).join("")}
      </div>
      ${week.coachFocus ? `
        <div class="card" style="margin-top:16px;">
          <h3>Coach Focus For This Week</h3>
          <p style="margin:0;">${esc(week.coachFocus)}</p>
        </div>
      ` : ""}
    `}
  `;
}

function openCompleteSessionModal(a, si){
  const week = getViewedWeek(a);
  const s = week.sessions[si];
  const wrap = document.createElement("div");
  wrap.className = "modal-backdrop";
  wrap.innerHTML = `
    <div class="modal-box">
      <h3>Mark "${esc(s.type)}" complete</h3>
      <p class="muted">How did the session feel?</p>
      <div class="field"><label>Actual distance (km)</label><input type="text" id="mcDistance" value="${esc(s.distance||"")}"></div>
      <div class="field"><label>Actual time</label><input type="text" id="mcTime" placeholder="e.g. 42 min"></div>
      <div class="field"><label>Effort (RPE 1–10)</label><input type="number" min="1" max="10" id="mcRpe"></div>
      <div class="field"><label>Notes (optional)</label><textarea id="mcNotes" placeholder="Felt good. Slightly tired after work."></textarea></div>
      <div class="row-actions">
        <button class="btn btn-primary" id="mcSave">Save</button>
        <button class="btn btn-secondary" id="mcCancel">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
  wrap.querySelector("#mcCancel").addEventListener("click", ()=>wrap.remove());
  wrap.querySelector("#mcSave").addEventListener("click", async ()=>{
    const actual = {
      distance: document.getElementById("mcDistance").value.trim(),
      time: document.getElementById("mcTime").value.trim(),
      rpe: document.getElementById("mcRpe").value.trim(),
      notes: document.getElementById("mcNotes").value.trim()
    };
    try{
      await apiPatchSession(a.id, week.id, s.id, true, actual);
      s.completed = true;
      s.actual = actual;
      wrap.remove();
      toast("Session marked complete");
      renderAthleteTabContent(a, "training");
    }catch(e){
      toast(e.message || "Couldn't save — try again");
    }
  });
}

function avProgress(a){
  const weeks = getWeeks(a);
  const streak = computeStreak(a);
  const month = computeMonthStats(a);
  const maxDist = Math.max(1, ...weeks.map(w=>weekProgress(w).distanceTotal||0));
  const pbKeys = ["5K","10K","Half Marathon","Marathon"];
  const pbs = a.personalBests||{};
  const pbRows = pbKeys.filter(k=>pbs[k] && (pbs[k].current||pbs[k].previous));
  return `
    <div class="overview-cards">
      <div class="ov-card"><div class="ov-num">${streak}</div><div class="ov-label">Week Streak</div></div>
      <div class="ov-card"><div class="ov-num">${month.distance}km</div><div class="ov-label">This Month</div></div>
      <div class="ov-card"><div class="ov-num">${month.sessions}</div><div class="ov-label">Sessions This Month</div></div>
    </div>
    <div class="card">
      <h3>Training Progress</h3>
      ${weeks.length ? `
        <div class="bar-chart">
          ${weeks.map(w=>{
            const p = weekProgress(w);
            const hPlanned = maxDist ? Math.round((p.distanceTotal/maxDist)*100) : 0;
            const hDone = maxDist ? Math.round((p.distanceCompleted/maxDist)*100) : 0;
            return `<div class="bar-col" title="Week ${w.weekNumber}: ${p.distanceCompleted}/${p.distanceTotal}km">
              <div class="bar-track"><div class="bar-planned" style="height:${hPlanned}%;"></div><div class="bar-done" style="height:${hDone}%;"></div></div>
              <div class="bar-label">W${esc(w.weekNumber)}</div>
            </div>`;
          }).join("")}
        </div>
        <p class="muted" style="margin-top:10px;font-size:.78rem;">■ completed &nbsp; □ planned</p>
      ` : `<p class="muted">No training weeks yet.</p>`}
    </div>
    <div class="card">
      <h3>Personal Bests</h3>
      <table class="simple">
        ${pbRows.length ? pbRows.map(k=>`<tr><th>${esc(k)}</th><td>${pbs[k].previous?esc(pbs[k].previous)+" → ":""}${esc(pbs[k].current||"—")}</td></tr>`).join("") : `<tr><td class="muted">No personal bests logged yet.</td></tr>`}
      </table>
    </div>
  `;
}

function avMessages(a){
  const wa = waLink(CONFIG.WHATSAPP_NUMBER, `Hi ${CONFIG.COACH_FIRST}, quick question about my training...`);
  const msgs = (a.messages||[]).slice().reverse();
  return `
    <div class="card" style="margin-bottom:16px;">
      <h3>Message your coach</h3>
      <p class="muted">Messaging happens over WhatsApp for now.</p>
      ${wa ? `<a class="btn btn-moss btn-sm" href="${esc(wa)}" target="_blank" rel="noopener">Open WhatsApp</a>` : `<p class="muted">No WhatsApp number configured.</p>`}
    </div>
    <div class="card">
      <h3>Notes from your coach</h3>
      ${msgs.length ? msgs.map(m=>`<div class="list-item"><div class="meta">${esc(m.date)}</div>${esc(m.text)}</div>`).join("") : `<p class="muted">No messages yet.</p>`}
    </div>
  `;
}

// The coach's shared Content Library (warm-ups, pace guides, race prep,
// recovery tips) — read-only here. Loaded async (same pattern as the
// Strava boxes) since AV_RENDERERS entries return synchronous HTML.
function avResources(a){
  return `
    <div class="card">
      <h3>Resources</h3>
      <p class="muted">Shared by ${esc(CONFIG.COACH_FIRST)} — warm-ups, pace guides, race prep, recovery tips.</p>
      <div id="avResourcesBox"><p class="muted">Loading…</p></div>
    </div>
  `;
}
async function loadAvResources(){
  const box = document.getElementById("avResourcesBox");
  if(!box) return;
  try{
    const resources = await getResources();
    box.innerHTML = resources.length ? resources.map(r=>`
      <div class="list-item">
        <div class="meta">${esc(r.category||"General")}</div>
        <strong>${esc(r.title)}</strong>
        ${r.body?`<div class="muted" style="white-space:pre-wrap;">${esc(r.body)}</div>`:""}
        ${r.link?`<div><a href="${esc(r.link)}" target="_blank" rel="noopener">${esc(r.link)}</a></div>`:""}
      </div>
    `).join("") : `<p class="muted">Nothing shared yet — check back soon.</p>`;
  }catch(e){
    box.innerHTML = `<p class="muted">Couldn't load resources right now.</p>`;
  }
}
function avProfile(a){
  return `
    <div class="card">
      <h3>Profile</h3>
      <table class="simple">
        <tr><th>Name</th><td>${esc(a.name||"—")}</td></tr>
        ${a.age?`<tr><th>Age</th><td>${esc(a.age)}</td></tr>`:""}
        <tr><th>Running experience</th><td>${esc(a.experience||"—")}</td></tr>
        <tr><th>Goal race</th><td>${esc(a.goalRace||"—")}</td></tr>
        <tr><th>Race date</th><td>${fmtDate(a.goalRaceDate)}</td></tr>
        <tr><th>Goal time</th><td>${esc(a.goalTime||"—")}</td></tr>
        <tr><th>Current phase</th><td>${esc(a.trainingPhase||"—")}</td></tr>
        <tr><th>Coaching since</th><td>${fmtDate(a.startDate)}</td></tr>
        <tr><th>Training availability</th><td>${esc(a.availability||"—")}</td></tr>
      </table>
    </div>
  `;
}

function wireAthleteView(tab, a){
  if(tab==="resources"){
    loadAvResources();
  }
  if(tab==="dashboard"){
    const btn = document.getElementById("viewNextWorkoutBtn");
    if(btn) btn.addEventListener("click", ()=>{ location.hash = `#/athlete-view/${a.id}/training`; });
  }
  if(tab==="training"){
    document.querySelectorAll("[data-toggle]").forEach(head=>{
      head.addEventListener("click", ()=>{
        const si = head.dataset.toggle;
        const det = document.getElementById("sd-"+si);
        if(det) det.style.display = det.style.display==="none" ? "block" : "none";
      });
    });
    document.querySelectorAll(".markCompleteBtn").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        openCompleteSessionModal(a, parseInt(btn.dataset.si,10));
      });
    });
    document.querySelectorAll(".avAddSessionCal").forEach(btn=>{
      btn.addEventListener("click", (e)=>{
        e.stopPropagation();
        const week = getViewedWeek(a);
        const session = week && week.sessions[parseInt(btn.dataset.si,10)];
        if(session) addSessionToCalendar(a, week, session);
      });
    });
    const weekCalBtn = document.getElementById("avAddWeekCal");
    if(weekCalBtn) weekCalBtn.addEventListener("click", ()=>{
      const week = getViewedWeek(a);
      if(week) addWeekToCalendar(a, week);
    });
    const prevBtn = document.getElementById("avPrevWeek");
    const nextBtn = document.getElementById("avNextWeek");
    const sel = document.getElementById("avWeekSelect");
    // Browsing to a different week here is local-only — it just changes
    // what this tab is showing right now. It must NOT touch a.currentWeekIndex
    // (that's the coach's own "current week" designation, which their
    // dashboard stats and Plan Builder "Current" tag rely on) and must NOT
    // be persisted to the server. See getViewedWeek / _avWeekIndex.
    function goToWeek(idx){
      _avWeekIndex = idx;
      renderAthleteTabContent(a, "training");
    }
    const curIdx = _avWeekIndex!=null ? _avWeekIndex : (a.currentWeekIndex||0);
    if(prevBtn) prevBtn.addEventListener("click", ()=>goToWeek(Math.max(0,curIdx-1)));
    if(nextBtn) nextBtn.addEventListener("click", ()=>goToWeek(Math.min(getWeeks(a).length-1,curIdx+1)));
    if(sel) sel.addEventListener("change", ()=>goToWeek(parseInt(sel.value,10)));
  }
}
</script>
